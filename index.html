<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  }
  @keyframes slide-up { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .slide-up { animation: slide-up 0.35s cubic-bezier(.32,.72,0,1) forwards; }
  @keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fade-in 0.28s ease forwards; }
  @keyframes notif-in { from { transform: translateY(-60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .notif-in { animation: notif-in 0.4s cubic-bezier(.32,.72,0,1) forwards; }
  @keyframes pulse-ring { 0% { transform: scale(0.95); opacity: 0.7; } 70% { transform: scale(1.4); opacity: 0; } 100% { transform: scale(1.4); opacity: 0; } }
  .pulse-ring { animation: pulse-ring 2s cubic-bezier(0.4,0,0.6,1) infinite; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

  /* ── abo 2-style animations ───────────────────────────────────── */
  @keyframes page-in { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
  .page-in { animation: page-in 0.32s cubic-bezier(.32,.72,0,1) forwards; }
  @keyframes card-rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  .card-rise { animation: card-rise 0.38s cubic-bezier(.22,1,.36,1) forwards; opacity:0; }
  @keyframes scale-in { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
  .scale-in { animation: scale-in 0.28s cubic-bezier(.22,1,.36,1) forwards; }
  /* Hover lift for cards (desktop) — also adds tap feedback for touch */
  .lift { transition: transform .25s cubic-bezier(.22,1,.36,1), box-shadow .25s ease; }
  .lift:hover { transform: translateY(-4px) scale(1.01); }
  .lift:active { transform: scale(0.98); }
  /* Subtle press scale */
  .press { transition: transform .15s ease; }
  .press:active { transform: scale(0.94); }
  /* Tab indicator dot pop */
  @keyframes dot-pop { from { transform: scale(0); opacity:0; } to { transform: scale(1); opacity:1; } }
  .dot-pop { animation: dot-pop .25s cubic-bezier(.22,1,.36,1) forwards; }
  /* Float-y bounce for hero icon */
  @keyframes float-y { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .float-y { animation: float-y 3s ease-in-out infinite; }
  /* FAB pulsing glow */
  @keyframes fab-glow { 0%,100% { box-shadow: 0 20px 40px -10px rgba(124,154,87,0.45); } 50% { box-shadow: 0 24px 48px -8px rgba(124,154,87,0.65); } }
  .fab-glow { animation: fab-glow 2.4s ease-in-out infinite; }
  /* Stagger helper – just an opacity reveal in steps */
  .stagger > *:nth-child(1) { animation-delay: .04s; }
  .stagger > *:nth-child(2) { animation-delay: .10s; }
  .stagger > *:nth-child(3) { animation-delay: .16s; }
  .stagger > *:nth-child(4) { animation-delay: .22s; }
  .stagger > *:nth-child(5) { animation-delay: .28s; }
  .stagger > *:nth-child(6) { animation-delay: .34s; }
  .stagger > *:nth-child(7) { animation-delay: .40s; }
  .stagger > *:nth-child(8) { animation-delay: .46s; }
  /* Smooth content transitions */
  .smooth-color { transition: color .25s ease, background .25s ease, border-color .25s ease; }
  /* Number "tick" highlight */
  @keyframes tick { 0% { transform: scale(1); } 50% { transform: scale(1.08); color: #7C9A57; } 100% { transform: scale(1); } }
  .tick { animation: tick .5s ease; }
  input:focus, select:focus {
    border-color: #7C9A57 !important;
    background: #fff !important;
    box-shadow: 0 0 0 3px rgba(124,154,87,0.15) !important;
  }

    cursor: pointer;
    opacity: 0.6;

function CountdownRing({ days, cycle, customDays, size = 46, strokeWidth = 4 }) {
  const { t } = useTranslation();
  const totalDays = cycle === "Wöchentlich" ? 7 : cycle === "Jährlich" ? 365 : cycle === "Benutzerdefiniert" ? (parseInt(customDays,10)||30) : 30;
  const elapsed = Math.max(0, totalDays - Math.max(0, days));
  const progress = Math.min(1, Math.max(0, elapsed / totalDays));
  const r = (size - strokeWidth) / 2;
  const cx = size / 2, cy = size / 2;
  const C = 2 * Math.PI * r;
  const offset = C * (1 - progress);
  const urgent = days >= 0 && days <= 3;
  const overdue = days < 0;
  const ringColor = overdue || urgent ? "#E05A5A" : "#7C9A57";
  const trackColor = overdue || urgent ? "rgba(224,90,90,0.15)" : "#E1E8D9";
  const label = overdue ? "!" : days === 0 ? t("card.today") : `${days}d`;
  return (
    <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={cx} cy={cy} r={r} stroke={trackColor} strokeWidth={strokeWidth} fill="none" />
        <circle cx={cx} cy={cy} r={r} stroke={ringColor} strokeWidth={strokeWidth} fill="none"
          strokeDasharray={C} strokeDashoffset={offset} strokeLinecap="round"
          style={{ transition: "stroke-dashoffset .6s cubic-bezier(.22,1,.36,1)" }} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, color: ringColor, letterSpacing: "-0.3px" }}>{label}</div>
    </div>
  );
}

function formatEur(amount) {
  const cur = window.__SUBLY_CURRENCY || "EUR";
  const locale = cur === "MAD" ? "fr-MA" : cur === "USD" || cur === "GBP" ? "en-US" : "de-DE";
  try {
    return new Intl.NumberFormat(locale, { style: "currency", currency: cur, maximumFractionDigits: 2 }).format(amount);
  } catch {
    return new Intl.NumberFormat("de-DE", { style: "currency", currency: "EUR" }).format(amount);
  }
}

function serializeSubs(subs) {
  return JSON.stringify(subs.map(s => ({
    ...s,
    nextDate: s.nextDate instanceof Date ? s.nextDate.toISOString() : s.nextDate,
    history: (s.history || []).map(d => d instanceof Date ? d.toISOString() : d),
  })));
}
function deserializeSubs(json) {
  if (!json) return null;
  try {
    const arr = JSON.parse(json);
    if (!Array.isArray(arr)) return null;
    return arr.map(s => ({
      ...s,
      nextDate: new Date(s.nextDate),
      history: (s.history || []).map(d => new Date(d)),
    }));
  } catch { return null; }
}
function daysUntil(date) {
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  const target = new Date(date);
  target.setHours(0, 0, 0, 0);
  return Math.round((target - now) / (1000 * 60 * 60 * 24));
}

function nextOccurrence(sub) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const anchor = new Date(sub.nextDate);
  anchor.setHours(0, 0, 0, 0);
  const cycle = sub.cycle || "Monatlich";

  if (anchor >= today) return anchor;

  if (cycle === "Monatlich") {
    const day = anchor.getDate();
    let y = today.getFullYear(), m = today.getMonth();
    let candidate = new Date(y, m, Math.min(day, new Date(y, m + 1, 0).getDate()));
    if (candidate < today) {
      m += 1;
      candidate = new Date(y, m, Math.min(day, new Date(y, m + 1, 0).getDate()));
    }
    return candidate;
  }
  if (cycle === "Wöchentlich") {
    const diff = (anchor.getDay() - today.getDay() + 7) % 7;
    const next = new Date(today);
    next.setDate(today.getDate() + (diff === 0 ? 7 : diff));
    return next;
  }
  if (cycle === "Jährlich") {
    let y = today.getFullYear();
    let candidate = new Date(y, anchor.getMonth(), anchor.getDate());
    if (candidate < today) candidate = new Date(y + 1, anchor.getMonth(), anchor.getDate());
    return candidate;
  }
  if (cycle === "Benutzerdefiniert") {
    const n = parseInt(sub.customDays, 10) || 30;
    const diffDays = Math.ceil((today - anchor) / (1000 * 60 * 60 * 24));
    const cycles = Math.ceil(diffDays / n);
    const candidate = new Date(anchor);
    candidate.setDate(anchor.getDate() + cycles * n);
    return candidate;
  }
  return anchor;
}
function daysLabel(d) {
  if (d === 0) return "Heute";
  if (d === 1) return "Morgen";
  if (d < 0) return `vor ${Math.abs(d)} Tagen`;
  return `in ${d} Tagen`;
}
function formatDate(date) {
  return date.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" });
}
function cycleLabel(sub) {
  const c = sub.cycle || "Monatlich";
  if (c === "Benutzerdefiniert") {
    const n = parseInt(sub.customDays, 10) || 30;
    return `alle ${n} Tage`;
  }
  return c;
}

// Sum what would be spent in the given (year, month) for one sub.
function monthlySpending(subs, year, month) {
  const monthStart = new Date(year, month, 1);
  monthStart.setHours(0,0,0,0);
  const monthEnd = new Date(year, month + 1, 0);
  monthEnd.setHours(23,59,59,999);
  let total = 0;
  subs.forEach(s => {
    const anchor = new Date(s.nextDate);
    anchor.setHours(0,0,0,0);
    if (anchor > monthEnd) return;
    const cycle = s.cycle || "Monatlich";
    if (cycle === "Monatlich") {
      total += s.price;
    } else if (cycle === "Wöchentlich") {
      const targetDow = anchor.getDay();
      for (let day = 1; day <= monthEnd.getDate(); day++) {
        const d = new Date(year, month, day);
        if (d >= anchor && d.getDay() === targetDow) total += s.price;
      }
    } else if (cycle === "Jährlich") {
      if (anchor.getMonth() === month) total += s.price;
    } else if (cycle === "Benutzerdefiniert") {
      const n = parseInt(s.customDays, 10) || 30;
      if (n > 0) {
        let cursor = new Date(anchor);
        while (cursor <= monthEnd) {
          if (cursor >= monthStart) total += s.price;
          cursor.setDate(cursor.getDate() + n);
        }
      }
    } else {
      if (anchor.getFullYear() === year && anchor.getMonth() === month) total += s.price;
    }
  });
  return total;
}

  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

// ─── Calendar Screen ────────────────────────────────────────────
function CalendarScreen({ subs, onAddOnDate }) {
  const { t } = useTranslation();
  function dateStr(year, month, d) {
    return `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  const today = new Date();
  const [selectedDay, setSelectedDay] = React.useState(null);
  const [year, setYear] = React.useState(today.getFullYear());
  const [month, setMonth] = React.useState(today.getMonth());
  const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
  const todayDay = isCurrentMonth ? today.getDate() : null;
  const monthNames = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  const dayNames = ["Mo","Di","Mi","Do","Fr","Sa","So"];
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const offset = (firstDay + 6) % 7;

  function shiftMonth(delta) {
    setSelectedDay(null);
    let m = month + delta, y = year;
    if (m < 0) { m = 11; y--; }
    else if (m > 11) { m = 0; y++; }
    setMonth(m); setYear(y);
  }

  const eventMap = {};
  function pushEvent(day, sub) {
    if (day < 1 || day > daysInMonth) return;
    if (!eventMap[day]) eventMap[day] = [];
    eventMap[day].push(sub);
  }
  subs.forEach(s => {
    const anchor = s.nextDate;
    const cycle = s.cycle || "Monatlich";
    const viewStart = new Date(year, month, 1);
    const viewEnd = new Date(year, month, daysInMonth);

    if (cycle === "Monatlich") {
      // jeden Monat am gleichen Tag (geclamped)
      if (viewEnd >= anchor) {
        pushEvent(Math.min(anchor.getDate(), daysInMonth), s);
      }
    } else if (cycle === "Wöchentlich") {
      // jede Woche am gleichen Wochentag
      const targetDow = anchor.getDay();
      for (let day = 1; day <= daysInMonth; day++) {
        const d = new Date(year, month, day);
        if (d >= anchor && d.getDay() === targetDow) pushEvent(day, s);
      }
    } else if (cycle === "Jährlich") {
      if (anchor.getMonth() === month && viewEnd >= anchor) {
        pushEvent(anchor.getDate(), s);
      }
    } else if (cycle === "Benutzerdefiniert") {
      // alle N Tage ab Startdatum
      const n = parseInt(s.customDays, 10) || 30;
      if (n > 0) {
        // Finde das erste Vorkommen, das >= viewStart ist
        const a = new Date(anchor); a.setHours(0,0,0,0);
        const vs = new Date(viewStart); vs.setHours(0,0,0,0);
        let cursor = new Date(a);
        if (cursor < vs) {
          const diffDays = Math.ceil((vs - cursor) / (1000*60*60*24));
          const cycles = Math.ceil(diffDays / n);
          cursor.setDate(cursor.getDate() + cycles * n);
        }
        while (cursor <= viewEnd) {
          if (cursor.getMonth() === month && cursor.getFullYear() === year) {
            pushEvent(cursor.getDate(), s);
          }
          cursor.setDate(cursor.getDate() + n);
        }
      }
    } else {
      // einmalig
      if (anchor.getFullYear() === year && anchor.getMonth() === month) {
        pushEvent(anchor.getDate(), s);
      }
    }
  });

  const selectedEvents = selectedDay ? (eventMap[selectedDay] || []) : [];
  const monthExpenses = Object.values(eventMap).flat().reduce((s,x) => s + x.price, 0);

  return (
    <div style={{ ...CAL.screen, height: "100dvh" }} className="page-in">
      <div style={CAL.header}>
        <div style={CAL.monthTitle}>{monthNames[month]} {year}</div>
        <div style={CAL.navRow}>
          <div style={CAL.navBtn} onClick={() => shiftMonth(-1)}>‹</div>
          {!isCurrentMonth && (
            <div className="press" style={{ ...CAL.navBtn, width:"auto", padding:"0 16px", background:"#7C9A57", color:"#fff", fontSize:12, fontWeight:800, boxShadow:"0 8px 18px -4px rgba(124,154,87,0.5)" }}
              onClick={() => { setYear(today.getFullYear()); setMonth(today.getMonth()); setSelectedDay(null); }}>Heute</div>
          )}
          <div style={CAL.navBtn} onClick={() => shiftMonth(1)}>›</div>
        </div>
      </div>

      <div style={CAL.totalBanner}>
        <div>
          <div style={CAL.totalLabel}>Ausgaben · {monthNames[month]}</div>
          <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.5)", marginTop:4 }}>{Object.keys(eventMap).length} Buchungen</div>
        </div>
        <span style={CAL.totalAmount}>{formatEur(monthExpenses)}</span>
      </div>

      <div style={CAL.dayNames}>
        {dayNames.map(d => <div key={d} style={CAL.dayName}>{d}</div>)}
      </div>

      <div style={CAL.grid}>
        {Array(offset).fill(null).map((_, i) => <div key={"e"+i} />)}
        {Array(daysInMonth).fill(null).map((_, i) => {
          const d = i + 1;
          const events = eventMap[d] || [];
          const hasEvents = events.length > 0;
          const isSel = d === selectedDay;
          const isToday = d === todayDay;
          return (
            <div key={d} className="press"
              style={{ ...CAL.dayCell, cursor: "pointer" }}
              onClick={() => {
                if (hasEvents) setSelectedDay(isSel ? null : d);
                else if (onAddOnDate) onAddOnDate(dateStr(year, month, d));
              }}>
              <span style={{
                width: 34, height: 34, borderRadius: "50%",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 14,
                background: isSel ? "#1C2612"
                          : isToday ? "#7C9A57"
                          : hasEvents ? "#F2F5EF" : "transparent",
                color: isSel ? "#fff" : isToday ? "#fff" : hasEvents ? "#465A30" : "#1C2612",
                fontWeight: isSel || isToday ? 800 : hasEvents ? 700 : 500,
                boxShadow: isToday && !isSel ? "0 8px 16px -4px rgba(124,154,87,0.55)" : isSel ? "0 8px 16px -4px rgba(28,38,18,0.4)" : "none",
                transition: "all 0.2s"
              }}>{d}</span>
              {hasEvents && (
                <div style={CAL.dots}>
                  {events.slice(0,3).map((_, di) => (
                    <div key={di} style={{ ...CAL.dot, background: isSel ? "#1C2612" : isToday ? "#fff" : (events[di].color || "#7C9A57") }} />
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {selectedDay && selectedEvents.length > 0 && (
        <div style={CAL.popup} className="fade-in">
          <div style={CAL.popupHeader}>
            <div style={CAL.popupTitle}>{selectedDay}. {monthNames[month]}</div>
            <div style={{ display:"flex", gap:8 }}>
              <div className="press" style={{ ...CAL.popupClose, background:"#7C9A57", color:"#fff", fontSize:16, fontWeight:800, boxShadow:"0 6px 14px -4px rgba(124,154,87,0.5)" }}
                onClick={() => onAddOnDate && onAddOnDate(dateStr(year, month, selectedDay))}>+</div>
              <div className="press" style={CAL.popupClose} onClick={() => setSelectedDay(null)}>✕</div>
            </div>
          </div>
          {selectedEvents.map((ev, i) => (
            <div key={i} style={{ ...CAL.eventRow, borderBottom: i < selectedEvents.length-1 ? "1px solid #F0EEE6" : "none" }}>
              <div style={{ ...CAL.eventIcon, background: ev.color, overflow: "hidden", padding: 0 }}><SmartLogo name={ev.name} defaultIcon={ev.icon} iconMode={ev.iconMode || "auto"} style={{width: "100%", height: "100%", borderRadius: 14}} /></div>
              <div style={{ flex:1 }}>
                <div style={CAL.eventName}>{ev.name}</div>
                <div style={CAL.eventCat}>{cycleLabel(ev)}</div>
              </div>
              <div style={CAL.eventAmount}>{formatEur(ev.price)}</div>
            </div>
          ))}
          {selectedEvents.length > 1 && (
            <div style={CAL.popupTotal}>
              <span style={{ color:"#8A9A7B", fontSize:12, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.8px" }}>Gesamt</span>
              <span style={{ fontWeight:800, color:"#7C9A57", fontSize:17 }}>{formatEur(selectedEvents.reduce((s,e) => s + e.price, 0))}</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

const formatDateLong = (date) => {
  if (!date) return "";
  const d = new Date(date);
  if (isNaN(d.getTime())) return "";
  return d.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" });
};

const parseDateInput = (str) => {
  const m = str.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
  if (!m) return null;
  const d = parseInt(m[1], 10);
  const mon = parseInt(m[2], 10);
  const y = parseInt(m[3], 10);
  const dt = new Date(y, mon - 1, d);
  if (dt.getFullYear() === y && dt.getMonth() === mon - 1 && dt.getDate() === d) {
    return dt.toISOString().split("T")[0];
  }
  return null;
};

const maskDateInput = (val) => {
  let v = val.replace(/\D/g, "");
  if (v.length > 8) v = v.slice(0, 8);
  let res = "";
  if (v.length > 0) {
    let d = v.slice(0, 2);
    if (d.length === 2) {
      const dn = parseInt(d, 10);
      if (dn > 31) d = "31";
      if (dn === 0 && d !== "0") d = "01";
    }
    res += d;
  }
  if (v.length > 2) {
    let m = v.slice(2, 4);
    if (m.length === 2) {
      const mn = parseInt(m, 10);
      if (mn > 12) m = "12";
      if (mn === 0 && m !== "0") m = "01";
    }
    res += "." + m;
  }
  if (v.length > 4) {
    res += "." + v.slice(4, 8);
  }
  return res;
};

  React.useEffect(() => {

      onOpenPicker(form.startDate, d => setForm(f => ({ ...f, startDate: d, startDateInput: undefined })));
    }
  }, [step]);

  const cycleStepValid = form.cycle !== "Benutzerdefiniert" || (parseInt(form.customDays,10) > 0);
  const canNext = [form.name, form.category, form.price, form.startDate, cycleStepValid, true][step];

  function nextStep() {
    if (step < steps.length - 1) setStep(s => s + 1);
    else { onAdd({ type: "sub", ...form, price: parseFloat(form.price) || 0 }); onClose(); }
  }

  const currencySym = (() => { try { return (0).toLocaleString((window.__SUBLY_CURRENCY||"EUR")==="MAD"?"fr-MA":"de-DE", { style:"currency", currency: window.__SUBLY_CURRENCY||"EUR" }).replace(/[\d.,\s]/g,""); } catch { return "€"; } })();

  return (
    <div style={AS.sheet}>
      <div style={AS.handle} />
      <div style={AS.titleRow}>
        <div style={AS.sheetTitle}>{t("add.title")}</div>
        <div style={AS.closeBtn} className="press" onClick={onClose}>✕</div>
      </div>

      {/* Live preview card */}
      <div style={{ background:"#F2F5EF", borderRadius:20, padding:14, marginBottom:18, display:"flex", alignItems:"center", gap:12 }} className="scale-in">
        <div style={{ width:54, height:54, borderRadius:16, background:form.color, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, boxShadow:"0 4px 10px rgba(0,0,0,0.08)", overflow: "hidden", padding: 0 }}><SmartLogo name={form.name} defaultIcon={form.icon} iconMode={form.iconMode} style={{width: "100%", height: "100%", borderRadius: 16}} /></div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:16, color:"#1C2612", fontWeight:800, letterSpacing:"-0.2px" }}>{form.name || "Abo-Name"}</div>
          <div style={{ fontSize:12.5, color:"#8A9A7B", marginTop:2, fontWeight:500 }}>{form.category}</div>
        </div>
        {form.price && (
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:17, color:"#1C2612", fontWeight:800 }}>{formatEur(parseFloat(form.price)||0)}</div>
            <div style={{ fontSize:10, color:"#A4BC8E", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.8px", marginTop:2 }}>{cycleLabel(form)}</div>
          </div>
        )}
      </div>

      {initialDate && (
        <div style={{ background:"#F2F5EF", borderRadius:14, padding:"10px 14px", marginBottom:14, display:"flex", alignItems:"center", gap:10, fontSize:13, color:"#5E7840", fontWeight:700 }}>
          <span style={{ fontSize:16 }}>📅</span>
          <span style={{ flex:1 }}>Startdatum: <span style={{ color:"#1C2612" }}>{(() => { const [y,m,d] = initialDate.split("-").map(Number); return formatDate(new Date(y,(m||1)-1,d||1)); })()}</span></span>
        </div>
      )}

      <div style={AS.progress}>
        {steps.map((_,i) => <div key={i} style={{ ...AS.progressDot, background: i <= step ? "#7C9A57" : "#E1E8D9" }} />)}
      </div>
      <div style={AS.stepTitle}>{steps[step]}</div>

      <div style={{ flex: 1, overflowY: "auto", paddingBottom: 20 }} className="fade-in" key={step}>
        {step === 0 && (
          <div>
            <input style={AS.input} placeholder="z.B. Netflix, Spotify…" value={form.name}
              onFocus={(e) => setTimeout(() => e.target.scrollIntoView({ behavior: "smooth", block: "center" }), 300)}
              onChange={e => setForm(f => ({ ...f, name: e.target.value }))} autoFocus />
            <div style={AS.iconGrid}>
              {icons.map(ic => (
                <div key={ic} className="press" style={{ ...AS.iconOpt, background: form.iconMode==="manual" && form.icon===ic ? form.color : "#F2F5EF", color: form.iconMode==="manual" && form.icon===ic ? "#fff" : "#1C2612", boxShadow: form.iconMode==="manual" && form.icon===ic ? "0 6px 14px rgba(0,0,0,0.1)" : "none" }}
                  onClick={() => setForm(f => ({ ...f, icon: ic, iconMode: "manual" }))}>{ic}</div>
              ))}
            </div>
            {form.iconMode === "manual" && (
              <>
                <div className="press" onClick={() => setForm(f => ({ ...f, iconMode: "auto" }))}
                  style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"7px 14px", borderRadius:12, background:"#F2F5EF", color:"#5E7840", fontSize:12, fontWeight:700, cursor:"pointer", marginBottom:8, transition:"all .2s" }}>
                  <span style={{ fontSize:14 }}>🔄</span> {t("add.autoLogo")}
                </div>
                <div style={AS.colorRow}>
                  {colors.map(c => (
                    <div key={c} className="press" style={{ ...AS.colorDot, background: c, transform: form.color===c ? "scale(1.18)" : "scale(1)", boxShadow: form.color===c ? `0 0 0 2px #fff, 0 0 0 4px ${c}` : "none" }}
                      onClick={() => setForm(f => ({ ...f, color: c }))} />
                  ))}
                </div>
              </>
            )}
          </div>
        )}
        {step === 1 && (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:10, paddingTop:6 }}>
            {CATEGORIES.map(c => (
              <div key={c} className="press" style={{ background: form.category===c ? "#7C9A57" : "#F2F5EF", color: form.category===c ? "#fff" : "#1C2612", padding:"16px 14px", borderRadius:18, fontWeight:700, fontSize:14, cursor:"pointer", transition:"all 0.2s", textAlign:"center", boxShadow: form.category===c ? "0 8px 20px -4px rgba(124,154,87,0.4)" : "none" }}
                onClick={() => setForm(f => ({ ...f, category: c }))}>{c}</div>
            ))}
          </div>
        )}
        {step === 2 && (
          <div style={{ padding: "20px 0" }}>
            <div style={AS.bigInput}>
              <span style={AS.bigCurr}>{currencySym || "€"}</span>
              <input style={AS.bigField} type="number" placeholder="0.00" value={form.price}
                onFocus={(e) => setTimeout(() => e.target.scrollIntoView({ behavior: "smooth", block: "center" }), 300)}
                onChange={e => setForm(f => ({ ...f, price: e.target.value }))} autoFocus />
            </div>
            <div style={AS.presets}>
              {[4.99,9.99,14.99,19.99].map(p => (
                <div key={p} className="press" style={AS.preset} onClick={() => setForm(f => ({ ...f, price: p.toString() }))}>{formatEur(p)}</div>
              ))}
            </div>
          </div>
        )}
        {step === 3 && (
          <div style={{ padding: "20px 0" }}>
            <div style={{ position: "relative", cursor: "pointer" }} onClick={() => onOpenPicker(form.startDate, d => setForm(f => ({ ...f, startDate: d, startDateInput: undefined })))}>
              <input style={{ ...AS.input, paddingLeft: 46 }} type="text" placeholder="dd.mm.yyyy" 
                value={form.startDateInput !== undefined ? form.startDateInput : formatDateLong(form.startDate)}
                onClick={e => e.stopPropagation()}
                onChange={e => {
                  const val = maskDateInput(e.target.value);
                  setForm(f => ({ ...f, startDateInput: val }));
                  const parsed = parseDateInput(val);
                  if (parsed) setForm(f => ({ ...f, startDate: parsed }));
                }}
                onBlur={() => setForm(f => ({ ...f, startDateInput: undefined }))}
              />
              <span className="press" style={{ position: "absolute", left: 16, top: 22, fontSize: 18 }}>📅</span>
            </div>
          </div>
        )}
        {step === 4 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10, paddingTop: 8 }}>
            {["Monatlich","Wöchentlich","Jährlich","Benutzerdefiniert"].map(c => (
              <div key={c} className="press" style={{ ...AS.cycleOpt, background: form.cycle===c ? "#7C9A57" : "#F2F5EF" }}
                onClick={() => setForm(f => ({ ...f, cycle: c }))}>
                <span style={{ color: form.cycle===c ? "#fff" : "#1C2612", fontWeight:700 }}>{c}</span>
                {form.cycle===c && <span style={{ width:24, height:24, borderRadius:"50%", background:"#fff", color:"#7C9A57", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:13 }}>✓</span>}
              </div>
            ))}
            {form.cycle === "Benutzerdefiniert" && (
              <div style={{ background:"#F2F5EF", borderRadius:18, padding:16, marginTop:6 }} className="fade-in">
                <div style={{ fontSize:13, color:"#5E7840", fontWeight:700, marginBottom:10, textTransform:"uppercase", letterSpacing:"0.6px" }}>{t("add.customDaysLabel")}</div>
                <div style={{ display:"flex", alignItems:"center", background:"#fff", borderRadius:14, padding:"10px 16px", marginBottom:12 }}>
                  <input type="number" min="1" max="365" placeholder="z.B. 14" value={form.customDays || ""}
                    onFocus={(e) => setTimeout(() => e.target.scrollIntoView({ behavior: "smooth", block: "center" }), 300)}
                    onChange={e => setForm(f => ({ ...f, customDays: e.target.value }))}
                    style={{ flex:1, background:"transparent", border:"none", outline:"none", fontSize:24, fontWeight:800, color:"#1C2612", letterSpacing:"-0.5px", width:"100%" }} />
                  <span style={{ fontSize:14, color:"#8A9A7B", fontWeight:700 }}>{t("add.daysLabel")}</span>
                </div>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                  {[3,7,14,30,60,90].map(n => (
                    <div key={n} className="press"
                      onClick={() => setForm(f => ({ ...f, customDays: String(n) }))}
                      style={{ background: String(form.customDays)===String(n) ? "#7C9A57" : "#fff", color: String(form.customDays)===String(n) ? "#fff" : "#5E7840", borderRadius:12, padding:"8px 14px", fontSize:13, fontWeight:800, cursor:"pointer", flex:"1 1 calc(33% - 6px)", textAlign:"center" }}>
                      {n} {t("add.daysShort")}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
      
        {step === 5 && (
          <div style={{ padding: "20px 0" }}>
            <div style={ES.label}>{t("add.bankName")}</div>
            <input style={AS.input} placeholder={t("add.bankNamePlaceholder")} value={form.paymentMethod?.bankName || ""}
              onFocus={(e) => setTimeout(() => e.target.scrollIntoView({ behavior: "smooth", block: "center" }), 300)}
              onChange={e => setForm(f => ({ ...f, paymentMethod: { ...f.paymentMethod, bankName: e.target.value } }))} autoFocus />
            <div style={{ ...ES.label, marginTop: 12 }}>{t("add.last4")}</div>
            <input style={AS.input} placeholder={t("add.last4Placeholder")} maxLength="4" value={form.paymentMethod?.last4 || ""}
              onFocus={(e) => setTimeout(() => e.target.scrollIntoView({ behavior: "smooth", block: "center" }), 300)}
              onChange={e => setForm(f => ({ ...f, paymentMethod: { ...f.paymentMethod, last4: e.target.value } }))} />
          </div>
        )}
      </div>
      <div style={AS.navRow}>
        {step > 0 ? <div className="press" style={AS.backBtn} onClick={() => setStep(s=>s-1)}>{t("add.back")}</div> : <div />}
        <div className="press" style={{ ...AS.nextBtn, background: canNext ? "#7C9A57" : "#E1E8D9", color: canNext ? "#fff" : "#8A9A7B", boxShadow: canNext ? "0 16px 32px -8px rgba(124,154,87,0.5)" : "none" }}
          onClick={canNext ? nextStep : null}>
          {step === steps.length-1 ? t("add.addBtn") : t("add.nextBtn")}
        </div>
      </div>
    </div>
  );
}

// ─── Insights Screen ────────────────────────────────────────────
function monthlyEquivalent(sub) {
  const c = (sub.cycle || "Monatlich");
  if (c === "Wöchentlich") return sub.price * 4.33;
  if (c === "Jährlich") return sub.price / 12;
  if (c === "Benutzerdefiniert") {
    const n = parseInt(sub.customDays, 10) || 30;
    return sub.price * (30.4375 / n);
  }
  return sub.price;
}
function InsightsScreen({ subs, accentGradient }) {
  const { t, i18n } = useTranslation();
  
  const allCats = Array.from(new Set(subs.map(s => s.category || "Sonstiges")));
  const allBanks = Array.from(new Set(subs.filter(s => s.paymentMethod?.bankName).map(s => s.paymentMethod.bankName)));
  const filterChips = ["All", ...allCats, ...allBanks];
  const [activeFilterChip, setActiveFilterChip] = React.useState("All");

  const filteredSubs = subs.filter(s => {
    if (activeFilterChip === "All") return true;
    if (allCats.includes(activeFilterChip)) return (s.category || "Sonstiges") === activeFilterChip;
    if (allBanks.includes(activeFilterChip)) return s.paymentMethod?.bankName === activeFilterChip;
    return true;
  });

  const totalExpenses = filteredSubs.reduce((s, x) => s + monthlyEquivalent(x), 0);
  const catMap = {};
  filteredSubs.forEach(s => { const c = s.category || "Sonstiges"; catMap[c] = (catMap[c] || 0) + monthlyEquivalent(s); });

  const cats = Object.entries(catMap).sort((a,b) => b[1]-a[1]);
  const catColors = ["#7C9A57","#E8A34A","#E05A5A","#8A9A7B","#465A30","#1C2612","#4A90E2","#9013FE"];

  // Build SVG donut paths
  function donutSlices(values, colors) {
    const total = values.reduce((a,b)=>a+b,0) || 1;
    const cx=80, cy=80, r=58, sw=18;
    let acc = -Math.PI/2; // start from top
    const gap = 0.04;
    return values.map((v,i) => {
      const frac = v/total;
      const ang = Math.max(0, frac*2*Math.PI - gap);
      const a0 = acc, a1 = acc + ang;
      acc += frac*2*Math.PI;
      const x0 = cx + r*Math.cos(a0), y0 = cy + r*Math.sin(a0);
      const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
      const large = ang > Math.PI ? 1 : 0;
      const d = `M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}`;
      return <path key={i} d={d} stroke={colors[i%colors.length]} strokeWidth={sw} fill="none" strokeLinecap="round" />;
    });
  }

  const monthShort = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  const today = new Date();
  const monthList = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    monthList.push({ y: d.getFullYear(), m: d.getMonth(), label: monthShort[d.getMonth()] });
  }
  const months = monthList.map(x => x.label);
  const expData = monthList.map(x => monthlySpending(filteredSubs, x.y, x.m));
  const maxVal = Math.max(...expData, 1) * 1.2;
  const [activeBar, setActiveBar] = React.useState(5);

  return (
    <div style={{ ...INS.screen, height: "100dvh" }} className="page-in">
      <div style={INS.header}>
        <div>
          <div style={INS.title}>{t("insights.title")}</div>
          <div style={{ fontSize:14, color:"#8A9A7B", fontWeight:600, marginTop:4 }}>{t("insights.subtitle")}</div>
        </div>
        <div style={INS.period}>{new Date().toLocaleDateString(i18n.language, { day: 'numeric', month: 'short', year: '2-digit' })}</div>
      </div>

      
      <div style={{ display: "flex", overflowX: "auto", gap: 10, padding: "0 18px 16px", scrollbarWidth: "none" }}>
        {filterChips.map(chip => (
          <FilterChip key={chip} active={activeFilterChip === chip} onClick={() => setActiveFilterChip(chip)}>
            {chip === "All" ? t("insights.all") : chip}
          </FilterChip>
        ))}
      </div>
      <div style={INS.heroCard}>
        <div style={INS.heroBlob1} />
        <div style={INS.heroBlob2} />
        <div style={{ position:"relative" }}>
          <div style={INS.heroLabel}>{t("insights.monthlyExp")}</div>
          <div style={INS.heroAmount}>{formatEur(totalExpenses)}</div>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:14 }}>
            <div style={{ background:"rgba(255,255,255,0.20)", color:"#fff", fontSize:11, fontWeight:800, padding:"6px 12px", borderRadius:14, border:"1px solid rgba(255,255,255,0.25)" }}>{t("insights.activeBadge", { n: subs.length })}</div>
            <div style={INS.heroSub}>{t("insights.perYear", { amount: formatEur(totalExpenses*12) })}</div>
          </div>
        </div>
      </div>

      <div style={INS.card}>
        <div style={INS.cardTitle}>{t("insights.trend")}</div>
        <div style={INS.chartArea}>
          {months.map((m,i) => (
            <div key={m} style={INS.barGroup} className="press" onClick={() => setActiveBar(i)}>
              <div style={INS.barLabel2}>{i===activeBar ? formatEur(expData[i]) : ""}</div>
              <div style={{ ...INS.bar, height:`${(expData[i]/maxVal)*80}px`, background: i===activeBar ? "#7C9A57" : "#E1E8D9", borderRadius:"10px 10px 4px 4px", transition:"all 0.25s cubic-bezier(.22,1,.36,1)", boxShadow: i===activeBar ? "0 8px 16px rgba(124,154,87,0.35)" : "none" }} />
              <div style={{ ...INS.barLabel, color: i===activeBar ? "#1C2612" : "#8A9A7B", fontWeight: i===activeBar ? 800 : 500 }}>{m}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={INS.card}>
        <div style={INS.cardTitle}>{t("insights.catDist")}</div>
        {cats.length > 0 ? (
          <>
            <div style={{ display:"flex", justifyContent:"center", marginBottom:16, position:"relative" }}>
              <svg width="160" height="160" viewBox="0 0 160 160">
                {donutSlices(cats.map(c=>c[1]), catColors)}
              </svg>
              <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", textAlign:"center" }}>
                <div style={{ fontSize:11, color:"#8A9A7B", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.8px" }}>Monat</div>
                <div style={{ fontSize:18, color:"#1C2612", fontWeight:800, letterSpacing:"-0.4px", marginTop:2 }}>{formatEur(totalExpenses)}</div>
              </div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              {cats.map(([cat,val],i) => (
                <div key={cat} style={INS.catRow}>
                  <div style={{ ...INS.catDot, background: catColors[i%catColors.length] }} />
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                      <span style={INS.catName}>{cat}</span>
                      <span style={{ display:"flex", gap:10, alignItems:"baseline" }}>
                        <span style={{ fontSize:12, color:"#8A9A7B", fontWeight:600 }}>{Math.round((val/totalExpenses)*100)}%</span>
                        <span style={INS.catVal}>{formatEur(val)}</span>
                      </span>
                    </div>
                    <div style={INS.catBg}>
                      <div style={{ ...INS.catFill, width:`${(val/totalExpenses)*100}%`, background:catColors[i%catColors.length] }} />
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </>
        ) : (
          <div style={{ textAlign:"center", color:"#8A9A7B", padding:"30px 0", fontSize:13.5 }}>{t("insights.noData")}</div>
        )}
      </div>

      <div style={INS.card}>
        <div style={INS.cardTitle}>{t("insights.allSubs")}</div>
        {[...filteredSubs].sort((a,b)=>monthlyEquivalent(b)-monthlyEquivalent(a)).map((s,i) => (
          <div key={s.id} style={{ ...INS.subRow, borderBottom: i < filteredSubs.length-1 ? "1px solid #F2F5EF" : "none" }}>
            <div style={{ ...INS.subIcon, background:s.color, overflow: "hidden", padding: 0 }}><SmartLogo name={s.name} defaultIcon={s.icon} iconMode={s.iconMode || "auto"} style={{width: "100%", height: "100%", borderRadius: 14}} /></div>
            <div style={{ flex:1 }}>
              <div style={INS.subName}>{s.name}</div>
              <div style={INS.subPct}>{Math.round((monthlyEquivalent(s)/totalExpenses)*100)}% · {cycleLabel(s)}</div>
            </div>
            <div style={INS.subPrice}>{formatEur(s.price)}</div>
          </div>
        ))}
        <div style={INS.totalRow}>
          <span style={{ color:"#8A9A7B", fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.8px" }}>{t("insights.totalMonth")}</span>
          <span style={{ color:"#7C9A57", fontWeight:800, fontSize:19 }}>{formatEur(totalExpenses)}</span>
        </div>
      </div>
    </div>
  );
}

const INS = {
  screen: { flex:1, overflowY:"auto", paddingBottom:110, background:"#F5F7F4" },

// ─── Settings Screen ────────────────────────────────────────────
function SettingsScreen({ accentGradient, userName, currency, onChangeCurrency, pushEnabled, onTogglePush, onTestPush, onChangeName, onResetSubs, onResetApp, subCount, profileImage, onChangeProfileImage }) {
  const { t, i18n } = useTranslation();
  const changeLanguage = (lng) => { i18n.changeLanguage(lng); localStorage.setItem("lang", lng); localStorage.setItem("subly:language", lng); document.documentElement.dir = lng === "ar" ? "rtl" : "ltr"; };
  const [editingName, setEditingName] = React.useState(false);
  const [tempName, setTempName] = React.useState(userName);
  const [confirmReset, setConfirmReset] = React.useState(null);
  const photoInputRef = React.useRef(null);
  function handlePhotoUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onloadend = () => { onChangeProfileImage(reader.result); };
    reader.readAsDataURL(file);
  }

  const getStorageUsage = () => {
    let total = 0;
    Object.keys(localStorage).forEach((key) => {
      const value = localStorage.getItem(key);
      if (value) total += new Blob([value]).size;
    });
    return total;
  };

  const [storageUsage, setStorageUsage] = React.useState(getStorageUsage());
  const usedMB = storageUsage / (1024 * 1024);
  const MAX_MB = 5;
  const percentage = Math.min(100, (usedMB / MAX_MB) * 100);

  React.useEffect(() => {
    setStorageUsage(getStorageUsage());
  }, [subCount]);

  const Toggle = ({ value, onChange }) => (
    <div onClick={() => onChange(!value)} style={{ width: 48, height: 28, borderRadius: 14, background: value ? "#7C9A57" : "#E1E8D9", position: "relative", cursor: "pointer", transition: "background 0.25s", flexShrink: 0, boxShadow: value ? "0 4px 10px rgba(124,154,87,0.35)" : "none" }}>
      <div style={{ position: "absolute", top: 3, left: value ? 23 : 3, width: 22, height: 22, borderRadius: "50%", background: "#fff", transition: "left 0.25s", boxShadow: "0 2px 6px rgba(0,0,0,0.2)" }} />
    </div>
  );

  const Section = ({ title, children }) => (
    <div style={S.section}>
      <div style={S.sectionLabel}>{title}</div>
      <div style={S.sectionCard}>{children}</div>
    </div>
  );
  const Row = ({ icon, label, right, border=true, onClick, danger }) => (
    <div onClick={onClick} style={{ ...S.row, borderBottom: border ? "1px solid #F2F5EF" : "none", cursor: onClick ? "pointer" : "default" }}>
      <span style={{ ...S.rowIcon, background: danger ? "#FCE9DD" : "#F2F5EF" }}>{icon}</span>
      <span style={{ ...S.rowLabel, color: danger ? "#E05A5A" : "#1C2612" }}>{label}</span>
      <div>{right}</div>
    </div>
  );

  function saveName() {
    const n = tempName.trim();
    if (n) { onChangeName(n); setEditingName(false); }
  }

  return (
    <div style={{ ...S.screen, height: "100dvh" }} className="page-in">
      <div style={S.header}><div style={S.title}>{t("settings.title")}</div></div>

      <div style={{ ...S.profileCard, background: accentGradient }}>
        <div style={{ ...S.avatar, cursor: "pointer", overflow: "hidden", padding: 0, position: "relative" }} className="press" onClick={() => photoInputRef.current?.click()}>
          {profileImage
            ? <img src={profileImage} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", borderRadius: "50%" }} />
            : getInitials(userName)
          }
          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 18, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ fontSize: 9, color: "#fff", fontWeight: 700 }}>📷</span>
          </div>
          <input ref={photoInputRef} type="file" accept="image/*" onChange={handlePhotoUpload} style={{ display: "none" }} />
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          {editingName ? (
            <input
              autoFocus
              value={tempName}
              onFocus={(e) => setTimeout(() => e.target.scrollIntoView({ behavior: "smooth", block: "center" }), 300)}
              onChange={e => setTempName(e.target.value)}
              onBlur={saveName}
              onKeyDown={e => { if (e.key === "Enter") saveName(); if (e.key === "Escape") { setTempName(userName); setEditingName(false); } }}
              style={{ background:"rgba(255,255,255,0.2)", border:"1px solid rgba(255,255,255,0.4)", borderRadius:8, padding:"6px 10px", color:"#fff", fontSize:16, fontWeight:700, outline:"none", width:"100%" }}
            />
          ) : (
            <div style={S.profileName}>{userName}</div>
          )}
          <div style={S.profileEmail}>{t("settings.editName")}</div>
        </div>
        <div style={S.profileEdit} onClick={() => { setTempName(userName); setEditingName(v => !v); }}>{editingName ? "✓" : "✏️"}</div>
        <div style={S.gloss} />
      </div>

      <Section title={t("settings.notifications")}>
        <Row icon="🔔" label={t("settings.push")} right={<Toggle value={pushEnabled} onChange={onTogglePush} />} />
        <Row icon="📨" label={t("settings.testPush")} right={<span style={{ ...S.badge, background:"#7C9A57", color:"#fff", cursor:"pointer" }} onClick={() => onTestPush && onTestPush()}>Senden</span>} border={false} />
      </Section>

      
      <Section title={t("settings.appearance")}>
        <Row icon="📷" label={t("settings.changeProfilePicture")} right={<span style={S.chevron}>›</span>} onClick={() => photoInputRef.current?.click()} />
        <Row icon="🌍" label={t("settings.language")} right={
          <select style={S.select} value={i18n.language} onChange={e => changeLanguage(e.target.value)}>
            <option value="de">Deutsch</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="ar">العربية</option>
          </select>
        } />
        <Row icon="💱" label={t("settings.currency")} right={
          <select style={S.select} value={currency} onChange={e => onChangeCurrency(e.target.value)}>
            <option>EUR</option><option>USD</option><option>GBP</option><option>CHF</option><option>MAD</option>
          </select>
        } border={false} />
      </Section>


      <Section title={t("settings.data")}>
        <Row icon="📊" label={t("settings.activeSubs", { count: subCount })} right={<span style={S.badge}>{subCount}</span>} />
        {confirmReset === "subs" ? (
          <Row icon="⚠️" label={t("settings.resetSubsConfirm")} right={
            <div style={{ display:"flex", gap:6 }}>
              <span style={{ ...S.badge, background:"#F2F5EF", color:"#8A9A7B", cursor:"pointer" }} onClick={() => setConfirmReset(null)}>{t("settings.cancel")}</span>
              <span style={{ ...S.badge, background:"#FCE9DD", color:"#E05A5A", cursor:"pointer" }} onClick={() => { onResetSubs(); setConfirmReset(null); }}>{t("settings.yes")}</span>
            </div>
          } border={false} />
        ) : (
          <Row icon="🔄" label={t("settings.resetSubs")} right={<span style={S.chevron}>›</span>} onClick={() => setConfirmReset("subs")} border={false} />
        )}
      </Section>

      <Section title={t("settings.storage")}>
        <div style={{ padding: "16px 18px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <span style={{ fontSize: 13, color: "#1C2612", fontWeight: 800 }}>{t("settings.storageUsed", { used: usedMB.toFixed(2), max: MAX_MB })}</span>
            <span style={{ fontSize: 11, color: "#8A9A7B", fontWeight: 700 }}>{Math.round(percentage)}%</span>
          </div>
          <div style={{ width: "100%", background: "#F2F5EF", borderRadius: 10, height: 8, overflow: "hidden" }}>
            <div
              style={{
                height: "100%",
                borderRadius: 10,
                transition: "all 0.4s cubic-bezier(.22,1,.36,1)",
                width: `${percentage}%`,
                backgroundColor:
                  percentage < 60
                    ? "#4CAF50"   // green
                    : percentage < 85
                    ? "#FFA500"   // orange
                    : "#FF3B30"   // red
              }}
            />
          </div>
          {percentage > 80 && (
            <div style={{ marginTop: 8, fontSize: 12, fontWeight: 700, color: percentage > 95 ? "#FF3B30" : "#FFA500", textAlign: i18n.language === "ar" ? "left" : "right" }}>
              {percentage > 95 ? t("settings.storageLimitReached") : t("settings.storageAlmostFull")}
            </div>
          )}
        </div>
      </Section>

      <Section title={t("settings.account")}>
        {confirmReset === "app" ? (
          <Row icon="⚠️" label={t("settings.resetAppConfirm")} right={
            <div style={{ display:"flex", gap:6 }}>
              <span style={{ ...S.badge, background:"#F2F5EF", color:"#8A9A7B", cursor:"pointer" }} onClick={() => setConfirmReset(null)}>{t("settings.cancel")}</span>
              <span style={{ ...S.badge, background:"#FCE9DD", color:"#E05A5A", cursor:"pointer" }} onClick={() => { onResetApp(); setConfirmReset(null); }}>{t("settings.yes")}</span>
            </div>
          } border={false} />
        ) : (
          <Row icon="🚪" label={t("settings.resetApp")} danger right={<span style={S.chevron}>›</span>} onClick={() => setConfirmReset("app")} border={false} />
        )}
      </Section>

      <div style={S.version}>{t("settings.version")} · {i18n.language === "de" ? "Deutsch" : i18n.language === "fr" ? "Français" : i18n.language === "ar" ? "العربية" : "English"}</div>
    </div>
  );
}

// ─── Edit Sub Screen ────────────────────────────────────────────
function EditSubScreen({ sub, onSave, onClose, onDelete, onOpenPicker }) {
  const { t } = useTranslation();
  const dateToInput = (d) => {
    const dt = new Date(d);
    if (isNaN(dt.getTime())) return "";
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  };

  const [form, setForm] = React.useState({
    name:       sub.name || "",
    price:      String(sub.price || ""),
    cycle:      sub.cycle || "Monatlich",
    customDays: String(sub.customDays || ""),
    category:   sub.category || "Sonstiges",
    startDate:  dateToInput(sub.nextDate),
    icon:       sub.icon || "⭐",
    iconMode:   sub.iconMode || "auto",
    color:      sub.color || "#7C9A57",
    paymentMethod: sub.paymentMethod || { bankName: "", last4: "" }
  });
  const [showConfirm, setShowConfirm] = React.useState(false);

  const icons  = ["⭐","🎵","🎬","☁️","🖌️","📰","🏋️","🎮","📚","🛒","🏠","✈️","💊","📱","🎧","📷"];
  const colors = ["#7C9A57","#E8A34A","#E05A5A","#8A9A7B","#465A30","#1C2612","#4A90E2","#9013FE"];

  function save() {
    if (!form.name || !form.price) return;
    const [y, m, d] = (form.startDate || "").split("-").map(Number);
    const nextDate = form.startDate ? new Date(y, (m||1)-1, d||1) : new Date(sub.nextDate);
    onSave({
      ...sub,
      name:       form.name,
      price:      parseFloat(form.price) || 0,
      cycle:      form.cycle,
      customDays: form.customDays,
      category:   form.category,
      nextDate,
      icon:       form.icon,
      iconMode:   form.iconMode,
      color:      form.color,
      paymentMethod: form.paymentMethod
    });
    onClose();
  }

  const canSave = form.name && form.price &&
    (form.cycle !== "Benutzerdefiniert" || parseInt(form.customDays,10) > 0);

  const currSym = (() => { try { return (1).toLocaleString((window.__SUBLY_CURRENCY||"EUR")==="MAD"?"fr-MA":"de-DE",{style:"currency",currency:window.__SUBLY_CURRENCY||"EUR"}).replace(/[\d.,\s]/g,""); } catch { return "€"; } })();

  return (
    <div style={{ ...AS.sheet, maxHeight:"92%" }}>
      <div style={AS.handle} />
      <div style={AS.titleRow}>
        <div style={AS.sheetTitle}>{t("add.editTitle")}</div>
        <div className="press" style={AS.closeBtn} onClick={onClose}>✕</div>
      </div>

// ─── Install Prompt ─────────────────────────────────────────────
function InstallPrompt({ accentGradient }) {
  const { t } = useTranslation();
  const [show, setShow] = React.useState(false);
  const [platform, setPlatform] = React.useState(null);
  const deferredPrompt = React.useRef(null);

  React.useEffect(() => {
    try { if (localStorage.getItem("subly:installDismissed") === "1") return; } catch {}
    if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) return;
    if (window.navigator.standalone) return;

    const ua = navigator.userAgent || "";
    const isIOS = /iPhone|iPad|iPod/.test(ua) && !window.MSStream;
    const isAndroid = /Android/.test(ua);

    if (isIOS) {
      setPlatform("ios");
      const t = setTimeout(() => setShow(true), 3500);
      return () => clearTimeout(t);
    } else if (isAndroid) {
      const handler = (e) => {
        e.preventDefault();
        deferredPrompt.current = e;
        setPlatform("android");
        setShow(true);
      };
      window.addEventListener('beforeinstallprompt', handler);
      return () => window.removeEventListener('beforeinstallprompt', handler);
    }
  }, []);

  function dismiss() {
    try { localStorage.setItem("subly:installDismissed", "1"); } catch {}
    setShow(false);
  }

  function install() {
    const p = deferredPrompt.current;
    if (!p) return;
    p.prompt();
    p.userChoice.finally(() => { deferredPrompt.current = null; dismiss(); });
  }

  if (!show) return null;

  return (
    <div style={{ position:"absolute", bottom:96, left:12, right:12, background:"#fff", borderRadius:24, padding:16, boxShadow:"0 18px 44px -8px rgba(0,0,0,0.18)", zIndex:300 }} className="slide-up">
      <div style={{ display:"flex", alignItems:"flex-start", gap:12 }}>
        <div style={{ width:46, height:46, borderRadius:14, background: "#7C9A57", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:22, color:"#fff", boxShadow:"0 8px 18px -4px rgba(124,154,87,0.45)" }}>📲</div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:14.5, fontWeight:800, color:"#1C2612", marginBottom:4, letterSpacing:"-0.2px" }}>Subly installieren</div>
          {platform === "ios" ? (
            <div style={{ fontSize:12.5, color:"#5E7840", lineHeight:1.55 }}>
              Tippe unten in Safari auf <span style={{ display:"inline-block", padding:"2px 7px", background:"#F2F5EF", borderRadius:6, color:"#5E7840", fontWeight:700 }}>Teilen ⬆︎</span> und dann auf <strong style={{ color:"#1C2612" }}>„Zum Home-Bildschirm"</strong>.
            </div>
          ) : (
            <div style={{ fontSize:12.5, color:"#5E7840", lineHeight:1.55 }}>
              Füge Subly zu deinem Startbildschirm hinzu, um sie wie eine App zu nutzen.
            </div>
          )}
        </div>
        <div onClick={dismiss} className="press" style={{ width:28, height:28, borderRadius:9, background:"#F2F5EF", display:"flex", alignItems:"center", justifyContent:"center", color:"#8A9A7B", cursor:"pointer", flexShrink:0, fontSize:13, fontWeight:700 }}>✕</div>
      </div>
      {platform === "android" && (
        <div onClick={install} className="press" style={{ marginTop:12, background: "#7C9A57", color:"#fff", borderRadius:14, padding:"12px 0", textAlign:"center", fontWeight:800, fontSize:14, cursor:"pointer", boxShadow:"0 12px 24px -6px rgba(124,154,87,0.45)" }}>
          Installieren
        </div>
      )}
    </div>
  );
}

// ─── App ────────────────────────────────────────────────────────
const ACCENT_START = "#8EB073";
const ACCENT_END = "#7C9A57";
const ACCENT_DARK = "#465A30";
const ACCENT_LIGHT = "#E1E8D9";
const ACCENT_TINT = "#F2F5EF";
const BG_WARM = "#F5F7F4";
const BG_CARD = "#FFFFFF";
const TEXT_DARK = "#1C2612";
const TEXT_MUTED = "#8A9A7B";
const DANGER = "#E05A5A";
const WARNING = "#E8A34A";
const ROUNDNESS = 28;
const SHADOW_CARD = "0 12px 36px -8px rgba(0,0,0,0.06), 0 4px 12px -4px rgba(0,0,0,0.04)";
const SHADOW_FLOAT = "0 20px 40px -10px rgba(124, 154, 87, 0.4)";

function App() {
  const accentGradient = `linear-gradient(135deg, ${ACCENT_START}, ${ACCENT_END})`;
  
  React.useEffect(() => {
    const lng = localStorage.getItem("subly:language") || "de";
    document.documentElement.dir = lng === "ar" ? "rtl" : "ltr";
  }, []);

  const [userName, setUserName] = React.useState(() => {
    try { return localStorage.getItem("subly:userName") || ""; } catch { return ""; }
  });
  const [profileImage, setProfileImage] = React.useState(() => {
    try { return localStorage.getItem("subly:profileImage") || ""; } catch { return ""; }
  });
  function handleChangeProfileImage(dataUrl) {
    try { localStorage.setItem("subly:profileImage", dataUrl); } catch {}
    setProfileImage(dataUrl);
  }
  const [currency, setCurrency] = React.useState(() => {
    try { return localStorage.getItem("subly:currency") || "EUR"; } catch { return "EUR"; }
  });
  const [pushEnabled, setPushEnabled] = React.useState(() => {
    try { return localStorage.getItem("subly:push") !== "0"; } catch { return true; }
  });
  const [subs, setSubs] = React.useState(() => {
    try { return deserializeSubs(localStorage.getItem("subly:subs")) || INITIAL_SUBS; } catch { return INITIAL_SUBS; }
  });

  React.useEffect(() => {
    try { localStorage.setItem("subly:subs", serializeSubs(subs)); } catch {}
  }, [subs]);
  const [activeTab, setActiveTab] = React.useState("home");
  const [showAdd, setShowAdd] = React.useState(false);
  const [addPrefillDate, setAddPrefillDate] = React.useState("");
  function openAddOnDate(dateISO) { setAddPrefillDate(dateISO); setShowAdd(true); setActiveTab(prev => prev); }
  function closeAdd() { setShowAdd(false); setAddPrefillDate(""); }
  const [selectedSub, setSelectedSub] = React.useState(null);
  const [editSub, setEditSub] = React.useState(null);
  function handleUpdate(updated) {
    setSubs(s => s.map(x => x.id === updated.id ? updated : x));
  }
  const [notification, setNotification] = React.useState(null);
  const [globalPicker, setGlobalPicker] = React.useState(null);

  // keep global currency in sync so formatEur reads latest
  window.__SUBLY_CURRENCY = currency;

  const [keyboardHeight, setKeyboardHeight] = React.useState(0);
  React.useEffect(() => {
    if (!window.visualViewport) return;
    const handleResize = () => {
      const vh = window.innerHeight;
      const vvh = window.visualViewport.height;
      setKeyboardHeight(Math.max(0, vh - vvh));
    };
    window.visualViewport.addEventListener("resize", handleResize);
    window.visualViewport.addEventListener("scroll", handleResize);
    return () => {
      window.visualViewport.removeEventListener("resize", handleResize);
      window.visualViewport.removeEventListener("scroll", handleResize);
    };
  }, []);

  function handleNameSubmit(name) {
    try { localStorage.setItem("subly:userName", name); } catch {}
    setUserName(name);
  }
  function handleChangeCurrency(c) {
    try { localStorage.setItem("subly:currency", c); } catch {}
    window.__SUBLY_CURRENCY = c;
    setCurrency(c);
  }
  async function handleTogglePush(v) {
    try { localStorage.setItem("subly:push", v ? "1" : "0"); } catch {}
    setPushEnabled(v);
    if (!v) { setNotification(null); return; }
    if ("Notification" in window && Notification.permission === "default") {
      try { await Notification.requestPermission(); } catch {}
    }
  }
  function fireBrowserNotification(title, body) {
    if (!("Notification" in window)) return false;
    if (Notification.permission !== "granted") return false;
    try { new Notification(title, { body, icon: "icon.svg", badge: "icon.svg", tag: "subly-reminder" }); return true; } catch { return false; }
  }
  function sendTestNotification() {
    const msg = subs.length === 0
      ? "Test-Benachrichtigung: Subly funktioniert! 🎉"
      : `Test: Dein nächstes Abo wird in Kürze fällig`;
    setNotification(msg);
    fireBrowserNotification("Subly · Test", msg);
    setTimeout(() => setNotification(null), 4500);
  }
  function handleResetSubs() {
    setSubs(INITIAL_SUBS);
    setActiveTab("home");
  }
  function handleResetApp() {
    try {
      localStorage.removeItem("subly:userName");
      localStorage.removeItem("subly:profileImage");
      localStorage.removeItem("subly:currency");
      localStorage.removeItem("subly:push");
      localStorage.removeItem("subly:subs");
    } catch {}
    setSubs(INITIAL_SUBS);
    setCurrency("EUR");
    setPushEnabled(true);
    setActiveTab("home");
    setUserName("");
    setProfileImage("");
  }

  React.useEffect(() => {
    if (!userName || !pushEnabled || subs.length === 0) return;
    const upcoming = subs
      .map(s => ({ s, next: nextOccurrence(s), days: daysUntil(nextOccurrence(s)) }))
      .filter(x => x.days >= 0 && x.days <= 7)
      .sort((a, b) => a.next - b.next)[0];
    if (!upcoming) return;
    const t = setTimeout(() => {
      const msg = `Dein ${upcoming.s.name}-Abo wird ${daysLabel(upcoming.days).toLowerCase()} abgebucht (${formatEur(upcoming.s.price)})`;
      setNotification(msg);
      fireBrowserNotification("Subly · Erinnerung", msg);
      setTimeout(() => setNotification(null), 5500);
    }, 1200);
    return () => clearTimeout(t);
  }, [userName, pushEnabled, subs]);

  function handleAdd({ type, ...data }) {
    let nd;
    if (data.startDate) {
      const [y, m, d] = data.startDate.split("-").map(Number);
      nd = new Date(y, (m || 1) - 1, d || 1);
    } else {
      nd = new Date(2026, 4, 10);
    }
    setSubs(s => [...s, { id: Date.now(), ...data, nextDate: nd, autoRenew: true, history: [], category: data.category || "Sonstiges", cycle: data.cycle || "Monatlich", paymentMethod: data.paymentMethod, iconMode: data.iconMode || "auto" }]);
  }

  function handleDelete(id) { setSubs(s => s.filter(x => x.id !== id)); }

  const tabs = [
    { id: "home",     icon: "🏠", label: "Home" },
    { id: "calendar", icon: "📅", label: "Kalender" },
    { id: "add",      icon: "+",  label: "",         special: true },
    { id: "insights", icon: "📊", label: "Einblicke" },
    { id: "settings", icon: "⚙️", label: "Optionen" },
  ];

  const screens = {
    home:     <HomeScreen key="home" subs={subs} onSwipeDelete={handleDelete} onSubClick={setSelectedSub} accentGradient={accentGradient} userName={userName} profileImage={profileImage} onChangeProfileImage={handleChangeProfileImage} />,
    calendar: <CalendarScreen key="cal" subs={subs} onAddOnDate={openAddOnDate} />,
    insights: <InsightsScreen key="ins" subs={subs} accentGradient={accentGradient} />,
    settings: <SettingsScreen key="set" accentGradient={accentGradient} userName={userName} currency={currency} onChangeCurrency={handleChangeCurrency} pushEnabled={pushEnabled} onTogglePush={handleTogglePush} onTestPush={sendTestNotification} onChangeName={handleNameSubmit} onResetSubs={handleResetSubs} onResetApp={handleResetApp} subCount={subs.length} profileImage={profileImage} onChangeProfileImage={handleChangeProfileImage} />,
  };

  const openGlobalPicker = (val, cb) => setGlobalPicker({ value: val, onChange: cb });

  const br = ROUNDNESS + 8;

  return (
    <div className="app-wrap" style={{ display:"flex", alignItems:"center", justifyContent:"center", minHeight:"100dvh", background: window.innerWidth > 500 ? "#E1E8D9" : "#F5F7F4" }}>
      <div className="phone-shell" style={{ 
        width: window.innerWidth > 500 ? 390 : "100%", 
        height: window.innerWidth > 500 ? 844 : "100dvh", 
        background:"#F5F7F4", 
        borderRadius: window.innerWidth > 500 ? br : 0, 
        overflow:"hidden", 
        display:"flex", 
        flexDirection:"column", 
        boxShadow: window.innerWidth > 500 ? `0 32px 80px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.05) inset, 0 0 0 10px #C4D4B4` : "none", 
        position:"relative", 
        flexShrink:0,
        paddingBottom: keyboardHeight
      }}>

        <div className="fake-statusbar" style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 24px 6px", flexShrink:0, background:"#F5F7F4" }}>
          <span style={{ fontSize:15, color:"#1C2612", fontWeight:700 }}>9:41</span>
          <div style={{ display:"flex", gap:6, fontSize:10, color:"#8A9A7B", alignItems:"center" }}>
            <span>●●●</span><span>WiFi</span><span>🔋</span>
          </div>
        </div>

        {!userName && (
          <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
            <WelcomeScreen onSubmit={handleNameSubmit} accentGradient={accentGradient} />
          </div>
        )}

        {userName && (<>


        {showAdd && (
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"flex-end", zIndex:200, background:"rgba(28,38,18,0.45)", backdropFilter:"blur(6px)" }} onClick={e => e.target===e.currentTarget && closeAdd()}>
            <div style={{ width:"100%", position:"relative" }} className="slide-up">
              <AddScreen onAdd={handleAdd} onClose={closeAdd} accentGradient={accentGradient} initialDate={addPrefillDate} onOpenPicker={openGlobalPicker} />
            </div>
          </div>
        )}

        {selectedSub && (
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"flex-end", zIndex:200, background:"rgba(28,38,18,0.45)", backdropFilter:"blur(6px)" }} onClick={e => e.target===e.currentTarget && setSelectedSub(null)}>
            <div style={{ width:"100%", position:"relative" }} className="slide-up">
              <SubDetailScreen sub={selectedSub} onClose={() => setSelectedSub(null)} onDelete={handleDelete} onEdit={() => { setEditSub(selectedSub); setSelectedSub(null); }} accentGradient={accentGradient} />
            </div>
          </div>
        )}

        {editSub && (
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"flex-end", zIndex:210, background:"rgba(28,38,18,0.45)", backdropFilter:"blur(6px)" }} onClick={e => e.target===e.currentTarget && setEditSub(null)}>
            <div style={{ width:"100%", position:"relative" }} className="slide-up">
              <EditSubScreen sub={editSub} onSave={handleUpdate} onClose={() => setEditSub(null)} onDelete={id => { handleDelete(id); setEditSub(null); }} onOpenPicker={openGlobalPicker} />
            </div>
          </div>
        )}

        <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", position:"relative" }}>
          {notification && (
            <div style={{ position:"absolute", top:10, left:16, right:16, background:"#1C2612", borderRadius:20, padding:"14px 16px", display:"flex", alignItems:"center", gap:12, zIndex:40, boxShadow:"0 14px 30px -6px rgba(28,38,18,0.4)" }} className="notif-in">
              <div style={{ width:36, height:36, borderRadius:11, background:"rgba(168,210,106,0.18)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>🔔</div>
              <span style={{ fontSize:13, color:"#E1E8D9", lineHeight:1.4, flex:1, fontWeight:500 }}>{notification}</span>
            </div>
          )}
          <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }} className="fade-in" key={activeTab}>
            {screens[activeTab] || null}
          </div>
          <InstallPrompt accentGradient={accentGradient} />
        </div>

        <div style={{ position:"relative", flexShrink:0 }}>
          {/* Floating + FAB raised above the bar */}
          <div onClick={() => { setAddPrefillDate(""); setShowAdd(true); }} className="press fab-glow"
               style={{ position:"absolute", left:"50%", top:-26, transform:"translateX(-50%)", width:60, height:60, borderRadius:"50%", background:"#7C9A57", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", border:"5px solid #fff", zIndex:10 }}>
            <span style={{ color:"#fff", fontSize:30, fontWeight:300, lineHeight:1, marginTop:-3 }}>+</span>
          </div>
          <div style={{ display:"flex", alignItems:"flex-end", background:"#fff", borderRadius:"28px 28px 0 0", paddingBottom:4, height:78, boxShadow:"0 -10px 40px -10px rgba(0,0,0,0.08)" }}>
            {tabs.filter(t => !t.special).map((t, idx) => (
              <React.Fragment key={t.id}>
                {idx === 2 && <div style={{ flex:1 }} />}
                <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:3, cursor:"pointer", position:"relative", paddingTop:14, height:"100%" }}
                     onClick={() => setActiveTab(t.id)}>
                  <span style={{ fontSize:20, lineHeight:1, filter: activeTab===t.id ? "none" : "grayscale(100%) opacity(0.55)", transition:"filter 0.25s" }}>{t.icon}</span>
                  <span style={{ fontSize:11, fontWeight:800, color: activeTab===t.id ? "#5E7840" : "#A4BC8E", transition:"color 0.2s", letterSpacing:"-0.1px" }}>{t.label}</span>
                  {activeTab===t.id && <div className="dot-pop" style={{ width:5, height:5, borderRadius:"50%", background:"#7C9A57", position:"absolute", bottom:8 }} />}
                </div>
              </React.Fragment>
            ))}
          </div>
        </div>

        <div className="home-indicator" style={{ height:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, background:"#fff" }}>
          <div style={{ width:120, height:4, borderRadius:2, background:"#E1E8D9" }} />
        </div>
        </>)}
      </div>
      {globalPicker && <DatePickerModal value={globalPicker.value} onChange={globalPicker.onChange} onClose={() => setGlobalPicker(null)} />}
    </div>
  );
}

const { I18nextProvider } = window.ReactI18next;
const Root = () => {
  const { i18n } = useTranslation();
  return <App key={i18n.language} />;
};

ReactDOM.createRoot(document.getElementById("root")).render(
  <I18nextProvider i18n={i18next}>
    <Root />
  </I18nextProvider>
);
</script>

</body>
</html>
