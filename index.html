<body>
<div id="root"></div>

<script type="text/babel">
// ─── Data & Utils ───────────────────────────────────────────────
const INITIAL_SUBS = [];

function formatEur(amount) {
  return new Intl.NumberFormat("de-DE", { style: "currency", currency: window.__SUBLY_CURRENCY || "EUR" }).format(amount);
}

function serializeSubs(subs) {
  return JSON.stringify(subs.map(s => ({
    ...s,
    nextDate: s.nextDate instanceof Date ? s.nextDate.toISOString() : s.nextDate,
    history: (s.history || []).map(d => d instanceof Date ? d.toISOString() : d),
  })));
}
function deserializeSubs(json) {
  if (!json) return null;
  try {
    const arr = JSON.parse(json);
    if (!Array.isArray(arr)) return null;
    return arr.map(s => ({
      ...s,
      nextDate: new Date(s.nextDate),
      history: (s.history || []).map(d => new Date(d)),
    }));
  } catch { return null; }
}
function daysUntil(date) {
  const now = new Date(2026, 3, 27);
  return Math.ceil((date - now) / (1000 * 60 * 60 * 24));
}
function daysLabel(d) {
  if (d === 0) return "Heute";
  if (d === 1) return "Morgen";
  if (d < 0) return `vor ${Math.abs(d)} Tagen`;
  return `in ${d} Tagen`;
}
function formatDate(date) {
  return date.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" });
}

// ─── Home Screen ────────────────────────────────────────────────
function getInitials(name) {
  const parts = (name || "").trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return "?";
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

// ─── Welcome Screen ─────────────────────────────────────────────
function WelcomeScreen({ onSubmit, accentGradient }) {
  const [name, setName] = React.useState("");
  const canSubmit = name.trim().length > 0;

  function submit() {
    if (canSubmit) onSubmit(name.trim());
  }

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", justifyContent:"center", padding:"32px 28px", background:"#F7F7FB" }}>
      <div style={{ width:72, height:72, borderRadius:22, background:accentGradient, display:"flex", alignItems:"center", justifyContent:"center", fontSize:36, marginBottom:24, boxShadow:"0 12px 32px rgba(99,102,241,0.35)" }}>💸</div>
      <div style={{ fontSize:28, fontWeight:800, color:"#111827", letterSpacing:"-0.5px", marginBottom:8 }}>Willkommen bei Subly</div>
      <div style={{ fontSize:15, color:"#6B7280", lineHeight:1.5, marginBottom:28 }}>Behalte deine Abonnements im Blick. Wie sollen wir dich nennen?</div>
      <input
        autoFocus
        placeholder="Dein Name"
        value={name}
        onChange={e => setName(e.target.value)}
        onKeyDown={e => e.key === "Enter" && submit()}
        style={{ width:"100%", background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:14, padding:"15px 18px", color:"#111827", fontSize:17, outline:"none", marginBottom:16 }}
      />
      <div
        onClick={canSubmit ? submit : null}
        style={{ background: canSubmit ? accentGradient : "#E5E7EB", color: canSubmit ? "#fff" : "#9CA3AF", borderRadius:16, padding:"15px 0", textAlign:"center", fontWeight:700, fontSize:16, cursor: canSubmit ? "pointer" : "default", transition:"all 0.2s" }}>
        Loslegen →
      </div>
    </div>
  );
}

function HomeScreen({ subs, onSwipeDelete, onSubClick, accentGradient, userName }) {
  const totalMonthly = subs.reduce((s, x) => s + x.price, 0);
  const nextSub = [...subs].sort((a, b) => a.nextDate - b.nextDate)[0];
  const nextDays = nextSub ? daysUntil(nextSub.nextDate) : 0;

  const [swipeStates, setSwipeStates] = React.useState({});
  const touchStart = React.useRef({});

  function handleTouchStart(id, e) { touchStart.current[id] = e.touches[0].clientX; }
  function handleTouchEnd(id, e) {
    const dx = e.changedTouches[0].clientX - (touchStart.current[id] || 0);
    if (dx < -60) setSwipeStates(s => ({ ...s, [id]: "delete" }));
    else if (dx > 60) setSwipeStates(s => ({ ...s, [id]: "edit" }));
    else if (Math.abs(dx) > 20) setSwipeStates(s => ({ ...s, [id]: null }));
  }

  const upcoming = [...subs].sort((a, b) => a.nextDate - b.nextDate);

  return (
    <div style={H.screen}>
      <div style={H.header}>
        <div>
          <div style={H.greeting}>Guten Tag 👋</div>
          <div style={H.name}>{userName}</div>
        </div>
        <div style={H.avatar}>{getInitials(userName)}</div>
      </div>

      {!nextSub && (
        <div style={{ margin:"8px 16px 14px", background:"#fff", borderRadius:20, padding:"32px 20px", textAlign:"center", boxShadow:"0 2px 12px rgba(0,0,0,0.05)", border:"1.5px dashed #E5E7EB" }}>
          <div style={{ fontSize:42, marginBottom:10 }}>📭</div>
          <div style={{ fontSize:16, color:"#111827", fontWeight:700, marginBottom:6 }}>Noch keine Abonnements</div>
          <div style={{ fontSize:13, color:"#9CA3AF", lineHeight:1.5 }}>Tippe auf <span style={{ color:"#6366F1", fontWeight:700 }}>+</span> unten, um dein erstes Abo hinzuzufügen.</div>
        </div>
      )}
      {nextSub && (
        <div style={{ ...H.nextCard, background: accentGradient, marginBottom: 14, padding: "20px 20px" }} onClick={() => onSubClick(nextSub)}>
          <div style={{ ...H.nextIcon, background: "rgba(255,255,255,0.2)", color: "#fff", fontSize: 24, width: 52, height: 52, borderRadius: 16 }}>{nextSub.icon}</div>
          <div style={{ flex: 1 }}>
            <div style={{ ...H.nextLabel, color: "rgba(255,255,255,0.7)" }}>Nächste Zahlung</div>
            <div style={{ ...H.nextName, color: "#fff", fontSize: 18 }}>{nextSub.name}</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ ...H.nextAmount, color: "#fff", fontSize: 22 }}>−{formatEur(nextSub.price)}</div>
            <div style={{ ...H.nextDays, color: nextDays <= 2 ? "#FDE68A" : "rgba(255,255,255,0.85)", fontSize: 13 }}>{daysLabel(nextDays)}</div>
          </div>
          <div style={H.gloss1} /><div style={H.gloss2} />
        </div>
      )}

      {subs.length > 0 && (
        <div style={H.insightBanner}>
          <span style={{ fontSize: 15 }}>💡</span>
          <span style={H.insightText}>Du gibst <strong style={{ color: "#6366F1" }}>{formatEur(totalMonthly)}</strong>/Monat für Abos aus</span>
        </div>
      )}

      {subs.length > 0 && (
        <div style={H.sectionRow}>
          <span style={H.sectionTitle}>Abonnements</span>
          <span style={H.sectionBadge}>{subs.length}</span>
        </div>
      )}

      <div style={H.list}>
        {upcoming.map(sub => {
          const d = daysUntil(sub.nextDate);
          const sw = swipeStates[sub.id];
          return (
            <div key={sub.id} style={H.rowWrap}
              onTouchStart={e => handleTouchStart(sub.id, e)}
              onTouchEnd={e => handleTouchEnd(sub.id, e)}>
              {sw === "delete" && (
                <div style={H.swipeDel}
                  onTouchStart={e => e.stopPropagation()}
                  onTouchEnd={e => { e.stopPropagation(); e.preventDefault(); onSwipeDelete(sub.id); setSwipeStates(s => ({...s,[sub.id]:null})); }}
                  onClick={e => { e.stopPropagation(); onSwipeDelete(sub.id); setSwipeStates(s => ({...s,[sub.id]:null})); }}>
                  🗑️<span style={{fontSize:10}}>Löschen</span>
                </div>
              )}
              {sw === "edit" && (
                <div style={H.swipeEdit}
                  onTouchStart={e => e.stopPropagation()}
                  onTouchEnd={e => { e.stopPropagation(); e.preventDefault(); onSubClick(sub); setSwipeStates(s => ({...s,[sub.id]:null})); }}
                  onClick={e => { e.stopPropagation(); onSubClick(sub); setSwipeStates(s => ({...s,[sub.id]:null})); }}>
                  ✏️<span style={{fontSize:10}}>Bearbeiten</span>
                </div>
              )}
              <div style={{ ...H.row, transform: sw === "delete" ? "translateX(-76px)" : sw === "edit" ? "translateX(76px)" : "none", transition: "transform .25s cubic-bezier(.4,0,.2,1)" }}
                onClick={() => onSubClick(sub)}>
                <div style={{ ...H.subIcon, background: sub.color + "15", color: sub.color }}>{sub.icon}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={H.subName}>{sub.name}</div>
                  <div style={H.subCat}>{sub.category} · {sub.cycle}</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={H.subPrice}>{formatEur(sub.price)}</div>
                  <div style={{ ...H.subDate, color: d <= 2 ? "#F59E0B" : "#9CA3AF" }}>{daysLabel(d)}</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

const H = {
  screen: { flex: 1, overflowY: "auto", paddingBottom: 100, background: "#F7F7FB" },
  header: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "18px 20px 12px", background: "#F7F7FB" },
  greeting: { fontSize: 13, color: "#9CA3AF", fontWeight: 500 },
  name: { fontSize: 20, color: "#111827", fontWeight: 800, letterSpacing: "-0.5px" },
  avatar: { width: 42, height: 42, borderRadius: "50%", background: "linear-gradient(135deg,#6366F1,#8B5CF6)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700, fontSize: 14 },
  gloss1: { position: "absolute", top: -50, right: -50, width: 140, height: 140, borderRadius: "50%", background: "rgba(255,255,255,0.09)", pointerEvents: "none" },

  nextCard: { margin: "0 16px 12px", background: "#fff", borderRadius: 20, padding: "14px 16px", display: "flex", alignItems: "center", gap: 12, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", cursor: "pointer", position: "relative", overflow: "hidden" },
  nextIcon: { width: 44, height: 44, borderRadius: 14, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 },

  insightText: { fontSize: 13, color: "#4338CA", lineHeight: 1.4 },

  subName: { fontSize: 15, color: "#111827", fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" },
  subCat: { fontSize: 12, color: "#9CA3AF", marginTop: 2 },
  subPrice: { fontSize: 15, color: "#111827", fontWeight: 700 },
  subDate: { fontSize: 12, fontWeight: 500, marginTop: 2 },
  swipeDel: { position: "absolute", right: 0, top: 0, bottom: 0, width: 76, background: "#EF4444", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2, color: "#fff", fontWeight: 700, fontSize: 18, cursor: "pointer", zIndex: 0, borderRadius: "0 16px 16px 0" },
  swipeEdit: { position: "absolute", left: 0, top: 0, bottom: 0, width: 76, background: "#6366F1", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2, color: "#fff", fontWeight: 700, fontSize: 18, cursor: "pointer", zIndex: 0, borderRadius: "16px 0 0 16px" },
};

// ─── Calendar Screen ────────────────────────────────────────────
function CalendarScreen({ subs }) {
  const [selectedDay, setSelectedDay] = React.useState(null);
  const [year, setYear] = React.useState(2026);
  const [month, setMonth] = React.useState(4);
  const monthNames = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  const dayNames = ["Mo","Di","Mi","Do","Fr","Sa","So"];
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const offset = (firstDay + 6) % 7;

  function shiftMonth(delta) {
    setSelectedDay(null);
    let m = month + delta, y = year;
    if (m < 0) { m = 11; y--; }
    else if (m > 11) { m = 0; y++; }
    setMonth(m); setYear(y);
  }

  const eventMap = {};
  subs.forEach(s => {
    const d = s.nextDate;
    if (d.getFullYear() === year && d.getMonth() === month) {
      const k = d.getDate();
      if (!eventMap[k]) eventMap[k] = [];
      eventMap[k].push(s);
    }
  });

  const selectedEvents = selectedDay ? (eventMap[selectedDay] || []) : [];
  const monthExpenses = Object.values(eventMap).flat().reduce((s,x) => s + x.price, 0);

  return (
    <div style={CAL.screen}>
      <div style={CAL.header}>
        <div style={CAL.monthTitle}>{monthNames[month]} {year}</div>
        <div style={CAL.navRow}>
          <div style={CAL.navBtn} onClick={() => shiftMonth(-1)}>‹</div>
          <div style={CAL.navBtn} onClick={() => shiftMonth(1)}>›</div>
        </div>
      </div>

      <div style={CAL.totalBanner}>
        <span style={CAL.totalLabel}>Ausgaben im {monthNames[month]}</span>
        <span style={CAL.totalAmount}>−{formatEur(monthExpenses)}</span>
      </div>

      <div style={CAL.dayNames}>
        {dayNames.map(d => <div key={d} style={CAL.dayName}>{d}</div>)}
      </div>

      <div style={CAL.grid}>
        {Array(offset).fill(null).map((_, i) => <div key={"e"+i} />)}
        {Array(daysInMonth).fill(null).map((_, i) => {
          const d = i + 1;
          const events = eventMap[d] || [];
          const hasEvents = events.length > 0;
          const isSel = d === selectedDay;
          return (
            <div key={d}
              style={{ ...CAL.dayCell, background: isSel ? "linear-gradient(135deg,#6366F1,#8B5CF6)" : "transparent", cursor: hasEvents ? "pointer" : "default" }}
              onClick={() => hasEvents && setSelectedDay(isSel ? null : d)}>
              <span style={{ ...CAL.dayNum, color: isSel ? "#fff" : "#374151", fontWeight: isSel ? 700 : 400 }}>{d}</span>
              {hasEvents && (
                <div style={CAL.dots}>
                  {events.slice(0,3).map((_, di) => (
                    <div key={di} style={{ ...CAL.dot, background: isSel ? "rgba(255,255,255,0.9)" : "#EF4444" }} />
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {selectedDay && selectedEvents.length > 0 && (
        <div style={CAL.popup} className="fade-in">
          <div style={CAL.popupHeader}>
            <div style={CAL.popupTitle}>{selectedDay}. {monthNames[month]}</div>
            <div style={CAL.popupClose} onClick={() => setSelectedDay(null)}>✕</div>
          </div>
          {selectedEvents.map((ev, i) => (
            <div key={i} style={{ ...CAL.eventRow, borderBottom: i < selectedEvents.length-1 ? "1px solid #F3F4F6" : "none" }}>
              <div style={{ ...CAL.eventIcon, background: ev.color+"18", color: ev.color }}>{ev.icon}</div>
              <div style={{ flex:1 }}>
                <div style={CAL.eventName}>{ev.name}</div>
                <div style={CAL.eventCat}>{ev.category} · {ev.cycle}</div>
              </div>
              <div style={CAL.eventAmount}>−{formatEur(ev.price)}</div>
            </div>
          ))}
          {selectedEvents.length > 1 && (
            <div style={CAL.popupTotal}>
              <span style={{ color:"#9CA3AF", fontSize:12 }}>Gesamt</span>
              <span style={{ fontWeight:800, color:"#EF4444", fontSize:15 }}>−{formatEur(selectedEvents.reduce((s,e) => s + e.price, 0))}</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

const CAL = {
  screen: { flex:1, overflowY:"auto", paddingBottom:100, background:"#F7F7FB" },
  header: { display:"flex", justifyContent:"space-between", alignItems:"center", padding:"18px 20px 10px" },

};

// ─── Add Screen ─────────────────────────────────────────────────
function AddScreen({ onAdd, onClose, accentGradient }) {
  const [step, setStep] = React.useState(0);
  const [form, setForm] = React.useState({ name: "", price: "", cycle: "Monatlich", startDate: "", icon: "⭐", color: "#6366F1" });

  const icons = ["⭐","🎵","🎬","☁️","🖌️","📰","🏋️","🎮","📚","🛒","🏠","✈️","💊","📱","🎧","📷"];
  const colors = ["#6366F1","#8B5CF6","#EC4899","#EF4444","#F59E0B","#22C55E","#06B6D4","#0EA5E9"];
  const steps = ["Name & Icon","Preis","Startdatum","Abrechnung"];

  const canNext = [form.name, form.price, form.startDate, true][step];

  function nextStep() {
    if (step < steps.length - 1) setStep(s => s + 1);
    else { onAdd({ type: "sub", ...form, price: parseFloat(form.price) || 0 }); onClose(); }
  }

  return (
    <div style={AS.sheet}>
      <div style={AS.handle} />
      <div style={AS.titleRow}>
        <div style={AS.sheetTitle}>Abonnement hinzufügen</div>
        <div style={AS.closeBtn} onClick={onClose}>✕</div>
      </div>

      <div style={AS.progress}>
        {steps.map((_,i) => <div key={i} style={{ ...AS.progressDot, background: i <= step ? "#6366F1" : "#E5E7EB" }} />)}
      </div>
      <div style={AS.stepTitle}>{steps[step]}</div>

      <div style={{ flex: 1 }}>
        {step === 0 && (
          <div>
            <input style={AS.input} placeholder="z.B. Netflix, Spotify…" value={form.name}
              onChange={e => setForm(f => ({ ...f, name: e.target.value }))} autoFocus />
            <div style={AS.iconGrid}>
              {icons.map(ic => (
                <div key={ic} style={{ ...AS.iconOpt, background: form.icon===ic ? form.color+"20" : "#F9FAFB", border: `2px solid ${form.icon===ic ? form.color : "transparent"}` }}
                  onClick={() => setForm(f => ({ ...f, icon: ic }))}>{ic}</div>
              ))}
            </div>
            <div style={AS.colorRow}>
              {colors.map(c => (
                <div key={c} style={{ ...AS.colorDot, background: c, transform: form.color===c ? "scale(1.25)" : "scale(1)", boxShadow: form.color===c ? `0 0 0 2px #fff, 0 0 0 4px ${c}` : "none" }}
                  onClick={() => setForm(f => ({ ...f, color: c }))} />
              ))}
            </div>
          </div>
        )}
        {step === 1 && (
          <div style={{ padding: "20px 0" }}>
            <div style={AS.bigInput}>
              <span style={AS.bigCurr}>€</span>
              <input style={AS.bigField} type="number" placeholder="0.00" value={form.price}
                onChange={e => setForm(f => ({ ...f, price: e.target.value }))} autoFocus />
            </div>
            <div style={AS.presets}>
              {[4.99,9.99,14.99,19.99].map(p => (
                <div key={p} style={AS.preset} onClick={() => setForm(f => ({ ...f, price: p.toString() }))}>{formatEur(p)}</div>
              ))}
            </div>
          </div>
        )}
        {step === 2 && (
          <div style={{ padding: "20px 0" }}>
            <input style={AS.input} type="date" value={form.startDate}
              onChange={e => setForm(f => ({ ...f, startDate: e.target.value }))} />
          </div>
        )}
        {step === 3 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10, paddingTop: 8 }}>
            {["Monatlich","Wöchentlich","Jährlich","Benutzerdefiniert"].map(c => (
              <div key={c} style={{ ...AS.cycleOpt, background: form.cycle===c ? "#EEF2FF" : "#F9FAFB", border: `1.5px solid ${form.cycle===c ? "#6366F1" : "transparent"}` }}
                onClick={() => setForm(f => ({ ...f, cycle: c }))}>
                <span style={{ color:"#111827", fontWeight:600 }}>{c}</span>
                {form.cycle===c && <span style={{ color:"#6366F1" }}>✓</span>}
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={AS.navRow}>
        {step > 0 ? <div style={AS.backBtn} onClick={() => setStep(s=>s-1)}>Zurück</div> : <div />}
        <div style={{ ...AS.nextBtn, background: canNext ? accentGradient : "#E5E7EB", color: canNext ? "#fff" : "#9CA3AF" }}
          onClick={canNext ? nextStep : null}>
          {step === steps.length-1 ? "Hinzufügen ✓" : "Weiter →"}
        </div>
      </div>
    </div>
  );
}

// ─── Insights Screen ────────────────────────────────────────────
function InsightsScreen({ subs, accentGradient }) {
  const totalExpenses = subs.reduce((s, x) => s + x.price, 0);
  const catMap = {};
  subs.forEach(s => { catMap[s.category] = (catMap[s.category] || 0) + s.price; });
  const cats = Object.entries(catMap).sort((a,b) => b[1]-a[1]);
  const catColors = ["#6366F1","#8B5CF6","#EC4899","#F59E0B","#22C55E","#06B6D4"];

  const months = ["Jan","Feb","Mär","Apr","Mai","Jun"];
  const expData = [72, 85, 92, 78, totalExpenses, 88];
  const maxVal = Math.max(...expData) * 1.2;
  const [activeBar, setActiveBar] = React.useState(4);

  return (
    <div style={INS.screen}>
      <div style={INS.header}>
        <div style={INS.title}>Einblicke</div>
        <div style={INS.period}>Mai 2026</div>
      </div>

      <div style={{ ...INS.heroCard, background: accentGradient }}>
        <div style={INS.heroLabel}>Monatliche Ausgaben</div>
        <div style={INS.heroAmount}>−{formatEur(totalExpenses)}</div>
        <div style={INS.heroSub}>{subs.length} aktive Abonnements</div>
        <div style={INS.gloss1} /><div style={INS.gloss2} />
      </div>

      <div style={INS.card}>
        <div style={INS.cardTitle}>Verlauf der letzten Monate</div>
        <div style={INS.chartArea}>
          {months.map((m,i) => (
            <div key={m} style={INS.barGroup} onClick={() => setActiveBar(i)}>
              <div style={INS.barLabel2}>{i===activeBar ? "−"+formatEur(expData[i]) : ""}</div>
              <div style={{ ...INS.bar, height:`${(expData[i]/maxVal)*80}px`, background: i===activeBar ? "#EF4444" : "#FEE2E2", borderRadius:"6px 6px 0 0", transition:"all 0.2s" }} />
              <div style={{ ...INS.barLabel, color: i===activeBar ? "#111827" : "#9CA3AF", fontWeight: i===activeBar ? 700 : 400 }}>{m}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={INS.card}>
        <div style={INS.cardTitle}>Nach Kategorie</div>
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          {cats.map(([cat,val],i) => (
            <div key={cat} style={INS.catRow}>
              <div style={{ ...INS.catDot, background: catColors[i%catColors.length] }} />
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                  <span style={INS.catName}>{cat}</span>
                  <span style={INS.catVal}>{formatEur(val)}</span>
                </div>
                <div style={INS.catBg}>
                  <div style={{ ...INS.catFill, width:`${(val/totalExpenses)*100}%`, background:catColors[i%catColors.length] }} />
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={INS.card}>
        <div style={INS.cardTitle}>Alle Abonnements</div>
        {[...subs].sort((a,b)=>b.price-a.price).map((s,i) => (
          <div key={s.id} style={{ ...INS.subRow, borderBottom: i < subs.length-1 ? "1px solid #F3F4F6" : "none" }}>
            <div style={{ ...INS.subIcon, background:s.color+"18", color:s.color }}>{s.icon}</div>
            <div style={{ flex:1 }}>
              <div style={INS.subName}>{s.name}</div>
              <div style={INS.subPct}>{Math.round((s.price/totalExpenses)*100)}% der Ausgaben</div>
            </div>
            <div style={INS.subPrice}>−{formatEur(s.price)}</div>
          </div>
        ))}
        <div style={INS.totalRow}>
          <span style={{ color:"#9CA3AF", fontSize:13 }}>Gesamt / Monat</span>
          <span style={{ color:"#DC2626", fontWeight:800, fontSize:16 }}>−{formatEur(totalExpenses)}</span>
        </div>
      </div>
    </div>
  );
}

function SettingsScreen({ accentGradient, userName, currency, onChangeCurrency, pushEnabled, onTogglePush, onChangeName, onResetSubs, onResetApp, subCount }) {
  const [editingName, setEditingName] = React.useState(false);
  const [tempName, setTempName] = React.useState(userName);
  const [confirmReset, setConfirmReset] = React.useState(null);

  const Toggle = ({ value, onChange }) => (
    <div onClick={() => onChange(!value)} style={{ width: 46, height: 26, borderRadius: 13, background: value ? "#6366F1" : "#E5E7EB", position: "relative", cursor: "pointer", transition: "background 0.25s", flexShrink: 0 }}>
      <div style={{ position: "absolute", top: 3, left: value ? 23 : 3, width: 20, height: 20, borderRadius: "50%", background: "#fff", transition: "left 0.25s", boxShadow: "0 1px 4px rgba(0,0,0,0.2)" }} />
    </div>
  );

  const Section = ({ title, children }) => (
    <div style={S.section}>
      <div style={S.sectionLabel}>{title}</div>
      <div style={S.sectionCard}>{children}</div>
    </div>
  );
  const Row = ({ icon, label, right, border=true, onClick, danger }) => (
    <div onClick={onClick} style={{ ...S.row, borderBottom: border ? "1px solid #F3F4F6" : "none", cursor: onClick ? "pointer" : "default" }}>
      <span style={S.rowIcon}>{icon}</span>
      <span style={{ ...S.rowLabel, color: danger ? "#DC2626" : "#374151" }}>{label}</span>
      <div>{right}</div>
    </div>
  );

  function saveName() {
    const n = tempName.trim();
    if (n) { onChangeName(n); setEditingName(false); }
  }

  return (
    <div style={S.screen}>
      <div style={S.header}><div style={S.title}>Einstellungen</div></div>

      <div style={{ ...S.profileCard, background: accentGradient }}>
        <div style={S.avatar}>{getInitials(userName)}</div>
        <div style={{ flex:1, minWidth:0 }}>
          {editingName ? (
            <input
              autoFocus
              value={tempName}
              onChange={e => setTempName(e.target.value)}
              onBlur={saveName}
              onKeyDown={e => { if (e.key === "Enter") saveName(); if (e.key === "Escape") { setTempName(userName); setEditingName(false); } }}
              style={{ background:"rgba(255,255,255,0.2)", border:"1px solid rgba(255,255,255,0.4)", borderRadius:8, padding:"6px 10px", color:"#fff", fontSize:16, fontWeight:700, outline:"none", width:"100%" }}
            />
          ) : (
            <div style={S.profileName}>{userName}</div>
          )}
          <div style={S.profileEmail}>Tippe ✏️ zum Bearbeiten</div>
        </div>
        <div style={S.profileEdit} onClick={() => { setTempName(userName); setEditingName(v => !v); }}>{editingName ? "✓" : "✏️"}</div>
        <div style={S.gloss} />
      </div>

      <Section title="Benachrichtigungen">
        <Row icon="🔔" label="Push-Benachrichtigungen" right={<Toggle value={pushEnabled} onChange={onTogglePush} />} border={false} />
      </Section>

      <Section title="Darstellung">
        <Row icon="💱" label="Währung" right={
          <select style={S.select} value={currency} onChange={e => onChangeCurrency(e.target.value)}>
            <option>EUR</option><option>USD</option><option>GBP</option><option>CHF</option>
          </select>
        } border={false} />
      </Section>

      <Section title="Daten">
        <Row icon="📊" label={`Aktive Abonnements`} right={<span style={S.badge}>{subCount}</span>} />
        {confirmReset === "subs" ? (
          <Row icon="⚠️" label="Wirklich alle Abos zurücksetzen?" right={
            <div style={{ display:"flex", gap:6 }}>
              <span style={{ ...S.badge, background:"#F3F4F6", color:"#6B7280", cursor:"pointer" }} onClick={() => setConfirmReset(null)}>Abbrechen</span>
              <span style={{ ...S.badge, background:"#FEE2E2", color:"#DC2626", cursor:"pointer" }} onClick={() => { onResetSubs(); setConfirmReset(null); }}>Ja</span>
            </div>
          } border={false} />
        ) : (
          <Row icon="🔄" label="Abos auf Standard zurücksetzen" right={<span style={S.chevron}>›</span>} onClick={() => setConfirmReset("subs")} border={false} />
        )}
      </Section>

      <Section title="Konto">
        {confirmReset === "app" ? (
          <Row icon="⚠️" label="Wirklich alles zurücksetzen?" right={
            <div style={{ display:"flex", gap:6 }}>
              <span style={{ ...S.badge, background:"#F3F4F6", color:"#6B7280", cursor:"pointer" }} onClick={() => setConfirmReset(null)}>Abbrechen</span>
              <span style={{ ...S.badge, background:"#FEE2E2", color:"#DC2626", cursor:"pointer" }} onClick={() => { onResetApp(); setConfirmReset(null); }}>Ja</span>
            </div>
          } border={false} />
        ) : (
          <Row icon="🚪" label="App komplett zurücksetzen" danger right={<span style={S.chevron}>›</span>} onClick={() => setConfirmReset("app")} border={false} />
        )}
      </Section>

      <div style={S.version}>Subly v1.0.0 · Deutsch</div>
    </div>
  );
}

              <div style={{ fontSize:12, marginTop:1, color:i===0?"#F59E0B":"#9CA3AF" }}>{i===0?"Ausstehend":"Bezahlt"}</div>
            </div>
            <div style={{ fontSize:14, color:"#111827", fontWeight:700 }}>{formatEur(sub.price)}</div>
          </div>
        ))}
      </div>

      <div style={{ display:"flex", gap:10 }}>
        <div style={SD.editBtn} onClick={onClose}>Schließen</div>
        {!showConfirm ? (
          <div style={SD.deleteBtn} onClick={() => setShowConfirm(true)}>Kündigen</div>
        ) : (
          <div style={{ ...SD.deleteBtn, background:"#EF4444", color:"#fff", display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}
            onClick={() => { onDelete(sub.id); onClose(); }}>
            <span style={{ fontSize:11 }}>Wirklich kündigen?</span>
            <span style={{ fontWeight:800 }}>Ja, löschen</span>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Install Prompt ─────────────────────────────────────────────
function InstallPrompt({ accentGradient }) {
  const [show, setShow] = React.useState(false);
  const [platform, setPlatform] = React.useState(null);
  const deferredPrompt = React.useRef(null);

  React.useEffect(() => {
    try { if (localStorage.getItem("subly:installDismissed") === "1") return; } catch {}
    if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) return;
    if (window.navigator.standalone) return;

    const ua = navigator.userAgent || "";
    const isIOS = /iPhone|iPad|iPod/.test(ua) && !window.MSStream;
    const isAndroid = /Android/.test(ua);

    if (isIOS) {
      setPlatform("ios");
      const t = setTimeout(() => setShow(true), 3500);
      return () => clearTimeout(t);
    } else if (isAndroid) {
      const handler = (e) => {
        e.preventDefault();
        deferredPrompt.current = e;
        setPlatform("android");
        setShow(true);
      };
      window.addEventListener('beforeinstallprompt', handler);
      return () => window.removeEventListener('beforeinstallprompt', handler);
    }
  }, []);

  function dismiss() {
    try { localStorage.setItem("subly:installDismissed", "1"); } catch {}
    setShow(false);
  }

  function install() {
    const p = deferredPrompt.current;
    if (!p) return;
    p.prompt();
    p.userChoice.finally(() => { deferredPrompt.current = null; dismiss(); });
  }

  if (!show) return null;

  return (
    <div style={{ position:"absolute", bottom:90, left:12, right:12, background:"#fff", borderRadius:18, padding:14, boxShadow:"0 12px 40px rgba(0,0,0,0.22)", border:"1px solid #E5E7EB", zIndex:300 }} className="slide-up">
      <div style={{ display:"flex", alignItems:"flex-start", gap:12 }}>
        <div style={{ width:44, height:44, borderRadius:12, background: accentGradient, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:22, color:"#fff" }}>📲</div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:14, fontWeight:800, color:"#111827", marginBottom:4 }}>Subly auf dem Handy installieren</div>
          {platform === "ios" ? (
            <div style={{ fontSize:12.5, color:"#6B7280", lineHeight:1.5 }}>
              Tippe unten in Safari auf <span style={{ display:"inline-block", padding:"1px 6px", background:"#EEF2FF", borderRadius:5, color:"#6366F1", fontWeight:700 }}>Teilen ⬆︎</span> und dann auf <strong style={{ color:"#111827" }}>„Zum Home-Bildschirm“</strong>, um Subly wie eine App zu nutzen.
            </div>
          ) : (
            <div style={{ fontSize:12.5, color:"#6B7280", lineHeight:1.5 }}>
              Füge Subly zu deinem Startbildschirm hinzu, um sie wie eine App zu nutzen.
            </div>
          )}
        </div>
        <div onClick={dismiss} style={{ width:26, height:26, borderRadius:7, background:"#F3F4F6", display:"flex", alignItems:"center", justifyContent:"center", color:"#9CA3AF", cursor:"pointer", flexShrink:0, fontSize:12, fontWeight:700 }}>✕</div>
      </div>
      {platform === "android" && (
        <div onClick={install} style={{ marginTop:12, background: accentGradient, color:"#fff", borderRadius:12, padding:"10px 0", textAlign:"center", fontWeight:700, fontSize:14, cursor:"pointer" }}>
          Installieren
        </div>
      )}
    </div>
  );
}

// ─── App ────────────────────────────────────────────────────────
const ACCENT_START = "#6366F1";
const ACCENT_END = "#8B5CF6";
const ROUNDNESS = 20;

function App() {
  const accentGradient = `linear-gradient(135deg, ${ACCENT_START}, ${ACCENT_END})`;

  const [userName, setUserName] = React.useState(() => {
    try { return localStorage.getItem("subly:userName") || ""; } catch { return ""; }
  });
  const [currency, setCurrency] = React.useState(() => {
    try { return localStorage.getItem("subly:currency") || "EUR"; } catch { return "EUR"; }
  });
  const [pushEnabled, setPushEnabled] = React.useState(() => {
    try { return localStorage.getItem("subly:push") !== "0"; } catch { return true; }
  });
  const [subs, setSubs] = React.useState(() => {
    try { return deserializeSubs(localStorage.getItem("subly:subs")) || INITIAL_SUBS; } catch { return INITIAL_SUBS; }
  });

  React.useEffect(() => {
    try { localStorage.setItem("subly:subs", serializeSubs(subs)); } catch {}
  }, [subs]);
  const [activeTab, setActiveTab] = React.useState("home");
  const [showAdd, setShowAdd] = React.useState(false);
  const [selectedSub, setSelectedSub] = React.useState(null);
  const [notification, setNotification] = React.useState(null);

  // keep global currency in sync so formatEur reads latest
  window.__SUBLY_CURRENCY = currency;

  function handleNameSubmit(name) {
    try { localStorage.setItem("subly:userName", name); } catch {}
    setUserName(name);
  }
  function handleChangeCurrency(c) {
    try { localStorage.setItem("subly:currency", c); } catch {}
    window.__SUBLY_CURRENCY = c;
    setCurrency(c);
  }
  function handleTogglePush(v) {
    try { localStorage.setItem("subly:push", v ? "1" : "0"); } catch {}
    setPushEnabled(v);
    if (!v) setNotification(null);
  }
  function handleResetSubs() {
    setSubs(INITIAL_SUBS);
    setActiveTab("home");
  }
  function handleResetApp() {
    try {
      localStorage.removeItem("subly:userName");
      localStorage.removeItem("subly:currency");
      localStorage.removeItem("subly:push");
      localStorage.removeItem("subly:subs");
    } catch {}
    setSubs(INITIAL_SUBS);
    setCurrency("EUR");
    setPushEnabled(true);
    setActiveTab("home");
    setUserName("");
  }

  React.useEffect(() => {
    if (!userName || !pushEnabled || subs.length === 0) return;
    const upcoming = [...subs].sort((a, b) => a.nextDate - b.nextDate)[0];
    if (!upcoming) return;
    const d = daysUntil(upcoming.nextDate);
    if (d < 0 || d > 3) return;
    const t = setTimeout(() => {
      setNotification(`Dein ${upcoming.name}-Abonnement wird ${daysLabel(d).toLowerCase()} abgebucht`);
      setTimeout(() => setNotification(null), 4000);
    }, 2000);
    return () => clearTimeout(t);
  }, [userName, pushEnabled, subs]);

  function handleAdd({ type, ...data }) {
    const nd = data.startDate ? new Date(data.startDate) : new Date(2026, 4, 10);
    setSubs(s => [...s, { id: Date.now(), ...data, nextDate: nd, autoRenew: true, history: [], category: "Sonstiges" }]);
  }

  function handleDelete(id) { setSubs(s => s.filter(x => x.id !== id)); }

  const tabs = [
    { id: "home",     icon: "⊞", label: "Übersicht" },
    { id: "calendar", icon: "📅", label: "Kalender" },
    { id: "add",      icon: "+",  label: "",         special: true },
    { id: "insights", icon: "📊", label: "Einblicke" },
    { id: "settings", icon: "⚙️", label: "Einstellungen" },
  ];

  const screens = {
    home:     <HomeScreen key="home" subs={subs} onSwipeDelete={handleDelete} onSubClick={setSelectedSub} accentGradient={accentGradient} userName={userName} />,
    calendar: <CalendarScreen key="cal" subs={subs} />,
    insights: <InsightsScreen key="ins" subs={subs} accentGradient={accentGradient} />,
    settings: <SettingsScreen key="set" accentGradient={accentGradient} userName={userName} currency={currency} onChangeCurrency={handleChangeCurrency} pushEnabled={pushEnabled} onTogglePush={handleTogglePush} onChangeName={handleNameSubmit} onResetSubs={handleResetSubs} onResetApp={handleResetApp} subCount={subs.length} />,
  };

  const br = ROUNDNESS + 8;

  return (
    <div className="app-wrap" style={{ display:"flex", alignItems:"center", justifyContent:"center", minHeight:"100vh", padding:16 }}>
      <div className="phone-shell" style={{ width:390, height:844, background:"#F7F7FB", borderRadius:br, overflow:"hidden", display:"flex", flexDirection:"column", boxShadow:`0 32px 80px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.05) inset, 0 0 0 10px #CBCBDB`, position:"relative", flexShrink:0 }}>

        <div className="fake-statusbar" style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 24px 6px", flexShrink:0, background:"#F7F7FB" }}>
          <span style={{ fontSize:15, color:"#111827", fontWeight:700 }}>9:41</span>
          <div style={{ display:"flex", gap:6, fontSize:10, color:"#6B7280", alignItems:"center" }}>
            <span>●●●</span><span>WiFi</span><span>🔋</span>
          </div>
        </div>

        {!userName && (
          <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
            <WelcomeScreen onSubmit={handleNameSubmit} accentGradient={accentGradient} />
          </div>
        )}

        {userName && (<>


        {showAdd && (
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"flex-end", zIndex:200, background:"rgba(17,24,39,0.45)", backdropFilter:"blur(6px)" }} onClick={e => e.target===e.currentTarget && setShowAdd(false)}>
            <div style={{ width:"100%", position:"relative" }} className="slide-up">
              <AddScreen onAdd={handleAdd} onClose={() => setShowAdd(false)} accentGradient={accentGradient} />
            </div>
          </div>
        )}

        {selectedSub && (
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"flex-end", zIndex:200, background:"rgba(17,24,39,0.45)", backdropFilter:"blur(6px)" }} onClick={e => e.target===e.currentTarget && setSelectedSub(null)}>
            <div style={{ width:"100%", position:"relative" }} className="slide-up">
              <SubDetailScreen sub={selectedSub} onClose={() => setSelectedSub(null)} onDelete={handleDelete} accentGradient={accentGradient} />
            </div>
          </div>
        )}

        <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", position:"relative" }}>
          {notification && (
            <div style={{ position:"absolute", top:8, left:16, right:16, background:"#fff", borderRadius:16, padding:"12px 14px", display:"flex", alignItems:"center", gap:10, zIndex:40, boxShadow:"0 8px 24px rgba(0,0,0,0.1)", border:"1px solid #E5E7EB" }} className="notif-in">
              <span style={{ fontSize:18 }}>🔔</span>
              <span style={{ fontSize:13, color:"#374151", lineHeight:1.4, flex:1 }}>{notification}</span>
            </div>
          )}
          <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }} className="fade-in" key={activeTab}>
            {screens[activeTab] || null}
          </div>
          <InstallPrompt accentGradient={accentGradient} />
        </div>

        <div style={{ display:"flex", alignItems:"center", background:"#fff", borderTop:"1px solid #F3F4F6", paddingBottom:4, height:72, flexShrink:0, boxShadow:"0 -4px 20px rgba(0,0,0,0.04)" }}>
          {tabs.map(t => t.special ? (
            <div key="add" style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }} onClick={() => setShowAdd(true)}>
              <div style={{ width:56, height:56, borderRadius:18, background:accentGradient, display:"flex", alignItems:"center", justifyContent:"center", boxShadow:`0 4px 20px rgba(99,102,241,0.4)`, marginTop:-20 }}>
                <span style={{ color:"#fff", fontSize:28, fontWeight:300, lineHeight:1, marginTop:-2 }}>+</span>
              </div>
            </div>
          ) : (
            <div key={t.id} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:2, cursor:"pointer", position:"relative", paddingTop:8, height:"100%" }}
              onClick={() => setActiveTab(t.id)}>
              <span style={{ fontSize: t.id==="settings" ? 16 : 18, lineHeight:1 }}>{t.icon}</span>
              <span style={{ fontSize:10, fontWeight:600, color: activeTab===t.id ? ACCENT_END : "#9CA3AF", transition:"color 0.2s" }}>{t.label}</span>
              {activeTab===t.id && <div style={{ width:4, height:4, borderRadius:"50%", background:ACCENT_END, position:"absolute", bottom:6 }} />}
            </div>
          ))}
        </div>

        <div className="home-indicator" style={{ height:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, background:"#fff" }}>
          <div style={{ width:120, height:4, borderRadius:2, background:"#D1D5DB" }} />
        </div>
        </>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
