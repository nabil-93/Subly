<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feOffset dy="4" result="offsetBlur"/>
      <feFlood flood-color="rgba(0,0,0,0.18)"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <rect width="512" height="256" rx="115" fill="url(#shine)"/>
  <circle cx="410" cy="100" r="90" fill="rgba(255,255,255,0.10)"/>
  <circle cx="80" cy="430" r="55" fill="rgba(255,255,255,0.08)"/>

  <g filter="url(#softShadow)" transform="translate(256 256)">
    <circle r="120" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="14" stroke-dasharray="40 32" stroke-linecap="round"/>
    <path d="M 95 -55 L 130 -55 L 112 -90 Z" fill="rgba(255,255,255,0.55)"/>
  </g>

  <text x="256" y="332" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Plus Jakarta Sans', 'Segoe UI', sans-serif"
    font-weight="900" font-size="240" fill="white" letter-spacing="-8">S</text>
</svg>
