<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8EB073"/>
      <stop offset="100%" stop-color="#7C9A57"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feOffset dy="8" result="offsetBlur"/>
      <feFlood flood-color="rgba(0,0,0,0.15)"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Squircle -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  
  <!-- Subtle Shine Overlay -->
  <rect width="512" height="320" rx="115" fill="url(#shine)"/>

  <!-- Decorative circles -->
  <circle cx="420" cy="100" r="110" fill="rgba(255,255,255,0.08)"/>
  <circle cx="80" cy="440" r="70" fill="rgba(255,255,255,0.06)"/>

  <!-- Icon Group -->
  <g filter="url(#softShadow)" transform="translate(256 256)">
    <!-- Progress Ring Segment (Stylized) -->
    <path d="M 0 -130 A 130 130 0 1 1 -70 110" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="18" stroke-linecap="round"/>
    
    <!-- Central stylized "S" -->
    <text x="0" y="82" text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
      font-weight="900" font-size="240" fill="white" letter-spacing="-10" style="filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1))">S</text>
  </g>
</svg>
